    <th:block layout:fragment="script"></th:block>
    <script>
        // function logout() {
        //     if (confirm("로그아웃 하시겠습니까?")) {
        //         window.location.href = "/logout";
        //     }
        // }
        document.addEventListener("DOMContentLoaded", function() {
            const currentPath = window.location.pathname;
            console.log("Current Path:", currentPath); // 디버깅용 로그
            const navItems = document.querySelectorAll('.nav-item');

            navItems.forEach(item => {
                const itemPath = item.getAttribute('href');
                
                // 홈("/")은 정확히 일치할 때만, 나머지는 경로를 포함할 때 active
                if (itemPath === currentPath || (itemPath !== '/' && currentPath.startsWith(itemPath))) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });


            // --- 4. [핵심] 비동기 폼 제출 로직 (반드시 DOMContentLoaded 안에 위치) ---
            const formIds = ['updateFormMobile', 'updateForm']; 
            formIds.forEach(id => {
                const form = document.getElementById(id);
                if (form) {
                    console.log(`비동기 리스너 등록 성공: ${id}`);
                    form.addEventListener('submit', function(e) {
                        e.preventDefault(); 
                        
                        const csrfTokenTag = document.querySelector('meta[name="_csrf"]');
                        const csrfHeaderTag = document.querySelector('meta[name="_csrf_header"]');
                        
                        if (!csrfTokenTag || !csrfHeaderTag) {
                            alert("보안 토큰을 찾을 수 없습니다.");
                            return;
                        }
    
                        const csrfToken = csrfTokenTag.getAttribute('content');
                        const csrfHeader = csrfHeaderTag.getAttribute('content');
    
                        const formData = new FormData(this);
                        const submitBtn = this.querySelector('.profile_save');
                        
                        submitBtn.disabled = true;
                        submitBtn.innerText = "저장 중...";
    
                        fetch(this.action, {
                            method: 'POST',
                            headers: { [csrfHeader]: csrfToken },
                            body: formData
                        })
                        .then(res => res.text())
                        .then(data => {
                            if (data.includes("success")) {
                                alert("프로필이 저장되었습니다!");
                                location.reload();
                            } else {
                                alert("저장 실패: " + data);
                            }
                        })
                        .catch(err => {
                            console.error("전송 에러:", err);
                            alert("서버 전송 중 오류가 발생했습니다.");
                        })
                        .finally(() => {
                            submitBtn.disabled = false;
                            submitBtn.innerText = "프로필 사진 저장하기";
                        });
                    });
                }
            });
        });
    </script>
</body>

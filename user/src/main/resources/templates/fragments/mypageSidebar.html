<div th:fragment="mypageSidebarMenuDesktop" class="desktop_sidebar">
    <aside class="sidebar">
        <nav>
            <div class="sr-only">
                <div id="existing-file-section" th:if="${file != null}" style="max-width: 100%; margin: 0 auto; text-align: center;">
                    <div class="imageDisplayArea">
                        <img id="preview" src="" alt="미리보기" style="max-width: 100%; margin: 0px auto; display: none;" />
                        <div>
                            <img th:if="${file != null}" id="imgFile" th:src="|/selectProfile?id=${userId}&args=1|" alt="파일이미지" width="80%" height="200" style="max-width: 100%; margin: 0px auto;" />
                        </div>
                        <img th:if="${file == null}" id="defaultImage" src="/images/not-image.png" alt="기본 이미지" style="max-width: 100%; margin: 0px auto;" />
                    </div>
                    <form>
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button type="button" style="margin-top: 10px; background-color: #aaa; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer;"
                            th:onclick="markFileDeleted([[${userId}]])">프로필 이미지 삭제</button>
                    </form>
                </div>
                <div th:unless="${file != null} ? 'hidden'">
                    <form class="profile-preview profile-form" id="updateForm" action="/updateProfile" method="post" enctype="multipart/form-data">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <input type="hidden" name="id" id="id" th:value="${userId}" />
                        <input type="hidden" name="userId" id="userId" th:value="${username}" />
                            <div id="drop-area" style="border: 2px dashed #b594ff; padding: 20px; text-align: center; border-radius: 8px;">
                                <div>
                                    <input type="file" name="image" id="image" accept="image/*" style="display: none" />
                                    <img th:if="${file == null}" id="defaultImage" src="/images/not-image.png" alt="기본 이미지" style="max-width: 100%; margin: 0px auto;" />
                                    <img id="preview" src="" alt="미리보기" class="hidden" style="max-width: 100%; margin-top: 10px;" />
                                    <div id="placeholder_message" class="message" style="color: #888; font-size: 0.9em; margin-top: 10px; display: block;">
                                        프로필 이미지를 선택해주세요.
                                    </div>
                                </div>
                            </div>
                            <button class="profile_save" type="submit">프로필 사진 저장하기</button>
                    </form>
                </div>
            </div>
            <div class="mypage-menu">
                <h3 class="sidebar-title">고객센터</h3>
                
                <ul class="sidebar-menu">
                    <!-- <li class="menu-item" th:classappend="${currentURI.startsWith('/notice01')} ? 'active' : ''">
                        <a href="/notice01">공지사항</a>
                    </li> -->
                    <li class="menu-item" th:classappend="${(currentURI.startsWith('/mypage/calendarPage')) ? 'active' : ''}">
                        <a href="/mypage/calendarPage">경호 캘린더</a>
                    </li>
                    <li class="menu-item" th:classappend="${currentURI.startsWith('/mypage/infoUpdate')} ? 'active' : ''">
                        <a href="/mypage/infoUpdate">내 정보</a>
                    </li>
                    <li class="menu-item" th:classappend="${currentURI.startsWith('/mypage/point')} ? 'active' : ''">
                        <a href="/mypage/pointList">포인트 내역</a>
                    </li>
                    <li class="menu-item" th:classappend="${currentURI.startsWith('/mypage/changePasswordPage')} ? 'active' : ''">
                        <a href="/mypage/changePasswordPage">비밀번호 변경</a>
                    </li>
                    <li class="menu-item" th:classappend="${currentURI.startsWith('/useGuide01')} ? 'active' : ''">
                        <a href="/mypage/guardApply">경호원 신청</a>
                    </li>
                </ul>
            </div>
        </nav>
    </aside>

</div>
<div th:fragment="mypageSidebarMenuMobile" class="mobile_sidebar_menu">
    <div class="mobile-sticky-nav">
        <nav class="m-scroll-menu">
            <a href="/mypage/calendarPage">경호 캘린더</a>|
            <a href="/mypage/infoUpdate">내 정보</a>|
            <a href="/mypage/pointList">포인트 내역</a>|
            <a href="/mypage/changePasswordPage">비밀번호 변경</a>|
            <a href="/mypage/guardApply">경호원 신청</a>
        </nav>
    </div>

<div th:fragment="mypageSidebarProfileMobile" class="mobile_sidebar_profile">
    <div class="sr-only">
        <div class="mrg20_b desktop-header">프로필 사진</div>
        <div id="existing_file_section_mobile" th:if="${file != null}" style="max-width: 100%; margin: 0 auto; text-align: center;">
            <div class="imageDisplayArea mobile_hidden">
                <img id="preview_mobile" src="" alt="미리보기" style="max-width: 100%; margin: 0px auto; display: none;" />
                <div>
                    <img th:if="${file != null}" id="imgFile_mobile" th:src="|/selectProfile?id=${userId}&args=1|" alt="파일이미지" width="80%" height="200" style="max-width: 100%; margin: 0px auto;" />
                </div>
                <img th:if="${file == null}" id="defaultImage_mobile" src="/images/not-image.png" alt="기본 이미지" style="max-width: 100%; margin: 0px auto;" />
            </div>
            <button type="button" style="margin-top: 10px; background-color: #aaa; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer;"
                    th:onclick="markFileDeleted([[${userId}]])">프로필 이미지 삭제</button>
        </div>
        <div th:unless="${file != null} ? 'hidden'">
            <form class="profile-preview profile-form" id="updateFormMobile" action="/updateProfile" method="post" enctype="multipart/form-data">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input type="hidden" name="id" id="" th:value="${userId}" />
                <input type="hidden" name="userId" id="" th:value="${username}" />
                <div id="drop_area_mobile" style="border: 2px dashed #b594ff; padding: 20px; text-align: center; border-radius: 8px;">
                    <div>
                        <input type="file" name="image" id="image_mobile" accept="image/*" style="display: none" />
                        <img th:if="${file == null}" id="defaultImage_mobile" src="/images/not-image.png" alt="기본 이미지" style="max-width: 100%; margin: 0px auto;" />

                        <!-- ⭐️ 여기 hidden 클래스 추가 ⭐️ -->
                        <img id="preview_mobile" src="" alt="미리보기" class="hidden" style="max-width: 100%; margin-top: 10px;" />
                        <div id="placeholder_message_mobile" class="message"
                                    style="color: #888; font-size: 0.9em; margin-top: 10px; display: block;">
                                    프로필 이미지를 선택해주세요.
                                </div>
                    </div>
                </div>
                <button class="profile_save" type="submit">프로필 사진 저장하기</button>
            </form>
        </div>
    </div>
    <script th:inline="javascript">
        document.addEventListener("DOMContentLoaded", () => {
            // --- 1. 요소 선택 ---
            const dropArea = document.getElementById("drop-area"); 
            const imageInput = document.getElementById("image");
            const preview = document.getElementById("preview");
            const defaultImage = document.getElementById("defaultImage");
            
            const dropAreaM = document.getElementById("drop_area_mobile");
            const imageInputM = document.getElementById("image_mobile");
            const previewM = document.getElementById("preview_mobile");
            const defaultImageM = document.getElementById("defaultImage_mobile");
    
            // --- 2. 초기 상태 설정 ---
            const initDisplay = (input, defImg, prv, imgFileId) => {
                if (!input) return;
                const imgFile = document.getElementById(imgFileId);
                if (defImg && (!input.files || input.files.length === 0)) {
                    defImg.style.display = 'block';
                    prv.style.display = 'none';
                    if (imgFile) imgFile.style.display = 'none';
                }
            };
            initDisplay(imageInput, defaultImage, preview, "imgFile");
            initDisplay(imageInputM, defaultImageM, previewM, "imgFile_mobile");
    
            // --- 3. 미리보기 및 드래그앤드롭 (데스크탑/모바일 공통 적용) ---
            const setupImageEvents = (area, input, def, prv, imgId) => {
                if (!area || !input) return;
                area.addEventListener("click", () => input.click());
                input.addEventListener("change", () => {
                    const file = input.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            const imgFile = document.getElementById(imgId);
                            if (imgFile) imgFile.style.display = 'none';
                            if (def) def.style.display = 'none';
                            prv.src = e.target.result;
                            prv.style.display = "inline";
                            prv.classList.remove('hidden');
                        };
                        reader.readAsDataURL(file);
                    }
                });
            };
            setupImageEvents(dropArea, imageInput, defaultImage, preview, "imgFile");
            setupImageEvents(dropAreaM, imageInputM, defaultImageM, previewM, "imgFile_mobile");
    
        });
    
        // 전역 함수 (삭제 로직)
        async function markFileDeleted(id) {
            const csrfToken = document.querySelector('meta[name="_csrf"]').getAttribute('content');
            const url = `/mypage/markDeleted/${id}`;
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { "X-CSRF-TOKEN": csrfToken }
                });
                if (response.ok) {
                    const text = await response.text();
                    if (text === 'SUCCESS') {
                        alert('삭제되었습니다.');
                        window.location.reload();
                    }
                }
            } catch (error) {
                alert('에러 발생: ' + error.message);
            }
        }
    </script>
</div>

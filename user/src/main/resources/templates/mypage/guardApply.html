<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
                xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
                layout:decorate="~{layouts/base_layout}"><head>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/css/style.css" />
    <style>
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
    }
    
    
    label {
      width: 130px;
      font-weight: 600;
      color: #222;
    }

    .mypageInput{
      flex: 1;
      padding: 15px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 1rem;
    }
    input[readonly] {
      background-color: #f0f0f0;
      cursor: not-allowed;
    }
    .mypage_button {
      margin-top: 10px;
      padding: 10px 20px;
      font-size: 1.1rem;
      border: none;
      border-radius: 5px;
      background-color: #f09a67;
      color: white;
      margin-right: 5px;
      cursor: pointer;
    }
        .mypage_button_width {
            width: 100%;
        margin-top: 0px;
        padding: 10px 20px;
        font-size: 1.1rem;
        border: none;
        border-radius: 5px;
        background-color: #f09a67;
        color: white;
        margin-right: 5px;
        /* cursor: pointer; */
        }

        .mypage_gray_button {
            width: 100%;
        margin-top: 0px;
        padding: 10px 20px;
        font-size: 1.1rem;
        border: none;
        border-radius: 5px;
        background-color: #aaa;
        color: white;
        margin-right: 5px;
        /* cursor: pointer; */
        }
    button:hover {
      background-color: #e28342;
    }
    .left-container {
    display: flex;
    flex-direction: column;  /* 세로 정렬 (이미지 위, 텍스트 아래) */
    align-items: center;     /* 가로 중심 정렬 */
    justify-content: center; /* 세로 중심 정렬 */
    height: 100%;            /* 부모 컨테이너 높이에 맞춤 (필요에 따라 조절) */
    width: 100%;             /* 부모 컨테이너 너비에 맞춤 */
    box-sizing: border-box;  /* 패딩, 보더 포함 */
    padding: 10px;           /* 영역 내 간격 */
    }
    .mypage_address {
        margin-right: 5px;
    }
    .zone_code {
        width: 100px;
    }
    </style>
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>

    <script th:inline="javascript">
        /*<![CDATA[*/
        const isAuthenticated = /*[[${#authentication.principal != 'anonymousUser'}]]*/ false; // 서버에서 boolean 값 주입
        if (isAuthenticated) {
            console.log("JavaScript: 사용자 로그인 상태입니다.");
        } else {
            console.log("JavaScript: 사용자 로그인 상태가 아닙니다.");
        }
        /*]]>*/
        document.addEventListener('DOMContentLoaded', function () {

        });

        // const csrfToken = /*[[${_csrf.token}]]*/ '';
        // const csrfHeaderName = /*[[${_csrf.headerName}]]*/ '';
    </script>
</head>
<body>
    <main layout:fragment="content">
        <div class="main-side-content">
            <div class="container">
                <th:block th:replace="~{fragments/mypageSidebar :: mypageSidebarMenuDesktop}" />
            </div>
            <div class="container_mobile">
                <th:block th:replace="~{fragments/mypageSidebar :: mypageSidebarMenuMobile}" />
            </div>
            <div class="mypage_title">
                <span>경호원 신청</span>
            </div>
            <!-- 이수증 수정할 곳 -->
            <form id="certForm" class="mypage_form certificate-preview" action="/mypage/uploadCertImage" method="post" enctype="multipart/form-data">
                <input type="hidden" name="id" th:value="${user.id}" />
                <input type="hidden" name="userId" th:value="${user.userId}" />
            
                <div class="section">
                    <h1>신분증</h1>
                    <div th:if="${getIdentity != null}" class="form-remove">
                        <img id="imgIdttFile" th:src="|/selectProfile?id=${user.id}&args=2|" alt="신분증" width="720" height="380" style="max-width: 100%;" />
                        <div>
                            <button type="button" style="margin-top: 10px; background-color: #aaa; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer;"
                            th:onclick="fileRemove([[${userId}]], '1')">신분증 이미지 삭제</button>
                        </div>
                    </div>
                    <div class="profile" th:if="${getIdentity == null}">
                        <div id="id_drop" class="drop-zone" style="width: 64%; border: 2px dashed #b594ff; padding: 20px; text-align: center; border-radius: 8px">
                            <input type="file" name="idImage" id="idImage" accept="image/*" style="display: none" />
                            <img id="id_preview" src="" alt="미리보기" style="max-width: 100%; display: none;" />
                            <p id="id_placeholder_message" style="color: #888;">신분증 이미지를 선택해주세요.</p>
                        </div>
                    </div>
                </div>
                <hr style="margin: 20px 0; border: 0.5px solid #eee;">
                <div class="section">
                    <h1>이수증</h1>
                    <div th:if="${getCertificate != null}" class="form-remove">
                        <img id="imgCertFile" th:src="|/selectProfile?id=${user.id}&args=3|" alt="이수증" width="720" height="380" style="max-width: 100%;" />
                        <div>
                            <button type="button" style="margin-top: 10px; background-color: #aaa; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer;"
                            th:onclick="fileRemove([[${userId}]], '2')">이수증 이미지 삭제</button>                                </div>
                    </div>
                    <div class="profile" th:if="${getCertificate == null}">
                        <div id="cert_drop" class="drop-zone" style="width: 64%; border: 2px dashed #b594ff; padding: 20px; text-align: center; border-radius: 8px">
                            <input type="file" name="certImage" id="certImage" accept="image/*" style="display: none" />
                            <img id="cert_preview" src="" alt="미리보기" style="max-width: 100%; display: none;" />
                            <p id="cert_placeholder_message" style="color: #888;">이수증 이미지를 선택해주세요.</p>
                        </div>
                    </div>
                </div>
                <div th:if="${getIdentity == null && getCertificate == null}" style="margin-top: 20px;">
                    <button type="button" id="imageUploadBtnBoth" class="mypage_button">
                        <span th:if="${getIdentity == null && getCertificate == null}">신분증 & 이수증 업로드</span>
                    </button>
                </div>
                <div th:if="${getIdentity == null && getCertificate != null}" style="margin-top: 20px;">
                    <button type="button" th:onclick="imageUpload([[${userId}]], '1')" class="mypage_button">
                        <span th:if="${getIdentity == null && getCertificate != null}">신분증 업로드</span>
                    </button>
                </div>
                <div th:if="${getIdentity != null && getCertificate == null}" style="margin-top: 20px;">
                    <button type="button" th:onclick="imageUpload([[${userId}]], '2')" class="mypage_button">
                        <span th:if="${getIdentity != null && getCertificate == null}">이수증 업로드</span>
                    </button>
                </div>
                <div class="section" id="guardSection">
                    <hr style="margin: 20px 0; border: 0.5px solid #eee;">
                    <h1>경호원 신청</h1>
                    <div class="form-row">
                        <button id="applyBtn" class="mypage_button_width" type="button" 
                                onclick="ApplyBodyguard(this, '01')" 
                                th:if="${user.guardType == '00'}">경호원 신청하기</button>
                        <button class="mypage_gray_button" type="button" disabled 
                                th:if="${user.guardType == '01'}">경호원 신청 중</button>
                        <button class="mypage_gray_button" type="button" disabled 
                                th:if="${user.guardType == '02'}">경호원 신청 완료</button>
                        <button class="mypage_gray_button" type="button" disabled
                                th:if="${user.guardType == '03'}">수행</button>
                        <button class="mypage_gray_button" type="button" disabled
                                th:if="${user.guardType == '04'}">인솔자</button>
                    </div>
                </div>
            </form>
            <div class="container">
                <th:block th:replace="~{fragments/mypageSidebar :: mypageSidebarProfileMobile}">
                    <hr style="margin: 20px 0; border: 0.5px solid #eee;">
                </th:block>
            </div>
        </div>
        <!-- 로그인하지 않은 사용자에게 보이는 메시지 -->
        <div sec:authorize="!isAuthenticated()" class="guest-message">
            <p>로그인 후 마이페이지를 이용하실 수 있습니다.</p>
            <p><a th:href="@{/login}">로그인하기</a></p>
        </div>
    </div>
    <!-- ✅ 드래그앤드롭 스크립트 -->
    <script th:inline="javascript">
        document.addEventListener('DOMContentLoaded', function() {
            // CSRF 토큰 전역 설정 (Meta 태그에서 가져오기)
            const csrfToken = document.querySelector('meta[name="_csrf"]')?.getAttribute('content');
            const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.getAttribute('content');
        
            const idCert = document.getElementById("id_drop");
            const dropCert = document.getElementById("cert_drop");
            const idImage = document.getElementById("idImage");
            const certImage = document.getElementById("certImage");
            const idPreview = document.getElementById("id_preview");
            const certPreview = document.getElementById("cert_preview");
            const idPlaceholderMessage = document.getElementById("id_placeholder_message");
            const certPlaceholderMessage = document.getElementById("cert_placeholder_message");
            const certUploadForm = document.getElementById("certForm");
            

            // --- [1] 미리보기 및 표시 업데이트 함수 ---
            function showPreview(file, type) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    if (type === "1" && idPreview) {
                        idPreview.src = e.target.result;
                        idPreview.style.display = "block";
                        if (idPlaceholderMessage) idPlaceholderMessage.style.display = "none";
                    } else if (type === "2" && certPreview) {
                        certPreview.src = e.target.result;
                        certPreview.style.display = "block";
                        if (certPlaceholderMessage) certPlaceholderMessage.style.display = "none";
                    }
                };
                reader.readAsDataURL(file);
            }
        
            // --- [2] 드래그 앤 드롭 및 클릭 이벤트 (신분증) ---
            if (idCert && idImage) {
                idCert.addEventListener("click", () => idImage.click());
                idCert.addEventListener("dragover", (e) => { e.preventDefault(); idCert.style.backgroundColor = "#f3e7ff"; });
                idCert.addEventListener("dragleave", () => { idCert.style.backgroundColor = "transparent"; });
                idCert.addEventListener("drop", (e) => {
                    e.preventDefault();
                    idCert.style.backgroundColor = "transparent";
                    const file = e.dataTransfer.files[0];
                    if (file?.type.startsWith("image/")) {
                        idImage.files = e.dataTransfer.files;
                        showPreview(file, "1");
                    }
                });
                // change 이벤트는 submit 밖으로 빼야 합니다.
                idImage.addEventListener("change", () => {
                    if (idImage.files[0]) showPreview(idImage.files[0], "1");
                });
            }
        
            // --- [3] 드래그 앤 드롭 및 클릭 이벤트 (이수증) ---
            if (dropCert && certImage) {
                dropCert.addEventListener("click", () => certImage.click());
                dropCert.addEventListener("dragover", (e) => { e.preventDefault(); dropCert.style.backgroundColor = "#f3e7ff"; });
                dropCert.addEventListener("dragleave", () => { dropCert.style.backgroundColor = "transparent"; });
                dropCert.addEventListener("drop", (e) => {
                    e.preventDefault();
                    dropCert.style.backgroundColor = "transparent";
                    const file = e.dataTransfer.files[0];
                    if (file?.type.startsWith("image/")) {
                        certImage.files = e.dataTransfer.files;
                        showPreview(file, "2");
                    }
                });
                certImage.addEventListener("change", () => {
                    if (certImage.files[0]) showPreview(certImage.files[0], "2");
                });
            }
        
            // --- [4] 신분증 & 이수증 비동기 업로드 버튼 ---
            const uploadBtn = document.getElementById('imageUploadBtnBoth');
            if (uploadBtn) {
                uploadBtn.addEventListener('click', function() {
                    const certFile = certImage?.files[0];
                    const idFile = idImage?.files[0];
                    
                    if (!idFile || !certFile) {
                        alert("신분증과 이수증 이미지를 모두 선택해주세요.");
                        return;
                    }
        
                    const formData = new FormData();
                    formData.append('idImage', idFile);
                    formData.append('certImage', certFile);
                    formData.append('id', document.querySelector('input[name="id"]').value);
                    formData.append('userId', document.querySelector('input[name="userId"]').value);
        
                    fetch('/mypage/uploadImage', {
                        method: 'POST',
                        headers: { [csrfHeader]: csrfToken },
                        body: formData,
                    })
                    .then(res => res.ok ? res.text() : Promise.reject('업로드 실패'))
                    .then(() => {
                        alert('이미지가 성공적으로 업로드되었습니다.');
                        location.reload();
                    })
                    .catch(err => alert(err));
                });
            }

            let user1 = /*[[${user}]]*/ null;
            console.log("JavaScript: 사용자 정보", user1);
        });

        function imageUpload (imageUpload, type) {
            const idFile = document.getElementById("idImage")?.files[0];
            const certFile = document.getElementById("certImage")?.files[0];
            const csrfToken = document.querySelector('meta[name="_csrf"]')?.getAttribute('content');
            const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.getAttribute('content');
            const formData = new FormData();


            // [수정 포인트 1] 유효성 검사 및 데이터 추가 논리 분리
            if (type === '1') {
                if (!idFile) {
                    alert("신분증 이미지를 선택해주세요.");
                    return;
                }
                formData.append('idImage', idFile); // 신분증만 보낼 때
            } else if (type === '2') {
                if (!certFile) {
                    alert("이수증 이미지를 선택해주세요.");
                    return;
                }
                formData.append('certImage', certFile); // 이수증만 보낼 때
            } else if (type === 'all') { // 만약 동시에 올리는 경우가 있다면
                if (!idFile || !certFile) {
                    alert("신분증과 이수증 이미지를 모두 선택해주세요.");
                    return;
                }
                formData.append('idImage', idFile);
                formData.append('certImage', certFile);
            }
        
            formData.append('id', document.querySelector('input[name="id"]').value);
            formData.append('userId', document.querySelector('input[name="userId"]').value);

            fetch('/mypage/uploadImage', {
                method: 'POST',
                headers: { [csrfHeader]: csrfToken },
                body: formData,
            })
            .then(res => res.ok ? res.text() : Promise.reject('업로드 실패'))
            .then(() => {
                alert('이미지가 성공적으로 업로드되었습니다.');
                location.reload();
            })
            .catch(err => alert(err));
        }
        // --- [5] 이미지 삭제 함수 (전역) ---
        function fileRemove(userId, type) {
            if (!confirm("정말로 이미지를 삭제하시겠습니까?")) return;
            
            const csrfToken = document.querySelector('meta[name="_csrf"]')?.getAttribute('content');
            const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.getAttribute('content');
        
            const formData = new FormData();
            formData.append('userId', userId);
            formData.append('type', type);
        
            fetch('/mypage/deleteImage', {
                method: 'POST',
                headers: { [csrfHeader]: csrfToken },
                body: formData
            })
            .then(res => res.ok ? res.text() : Promise.reject('삭제 실패' + res.text()))
            .then(() => {
                alert('이미지가 삭제되었습니다.');
                location.reload();
            })
            .catch(err => alert(err));
        }

        // --- [6] 경호원 신청 함수 (전역) ---
        function ApplyBodyguard(btnElement, param) {
            let user = /*[[${user}]]*/ null;
            let getAddress = /*[[${getAddress}]]*/ null;
            const imgCertFile = document.getElementById('imgCertFile');
            const imgIdttFile = document.getElementById('imgIdttFile');
            const imgFile = document.getElementById('imgFile');
            const bankNm = user?.bankNm;
            const accountNumber = user?.accountNumber;
            const depositor = user?.depositor;
            const getFullAddress = user?.fullAddress;

            if (!imgFile?.src || imgFile.src.includes('not-image')) {
                alert('프로필 이미지가 없습니다.'); return;
            }
            if (!imgIdttFile?.src || imgIdttFile.src.includes('not-image')) {
                alert('신분증 이미지가 없습니다.'); return;
            }
            if (!imgCertFile?.src || imgCertFile.src.includes('not-image')) {
                alert('이수증 이미지가 없습니다.'); return;
            }
            if (!bankNm || !accountNumber || !depositor) {
                alert('계좌 정보(은행, 계좌번호, 예금주)를 모두 입력하고 저장해주세요.');
                return;
            }
            if (!getFullAddress) {
                alert('주소를 등록하고 저장해주세요.');
                return;
            }
        
            if(!confirm("경호원 신청을 하시겠습니까?")) return;
            // 1. 비활성화 (중복 클릭 방지)
            btnElement.disabled = true;

            // 2. 텍스트 변경
            btnElement.innerText = "신청 처리 중...";
        
            const csrfToken = document.querySelector('meta[name="_csrf"]')?.getAttribute('content');
            const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.getAttribute('content');
        
            const form = document.getElementById('certForm');
            const formData = new FormData(form);
            formData.append('guardType', param);
        
            fetch('/mypage/applyBodyguard', {
                method: 'POST',
                headers: { [csrfHeader]: csrfToken },
                body: formData
            })
            .then(res => res.ok ? res.json() : Promise.reject('저장 실패'))
            .then(data => alert("신청이 완료되었습니다!"),
                btnElement.innerText = "경호원 신청 중",
                btnElement.disabled = true,
                btnElement.style.backgroundColor = "#eee", // 시각적으로 비활성화 표시
                btnElement.style.color = "#999"
            )
            .catch(err => alert("오류 발생: " + err));
        }
        </script>
</main>
</body>
</html>

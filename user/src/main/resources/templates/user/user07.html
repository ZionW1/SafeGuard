<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity5">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>비밀번호 재등록</title>
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>
    <div class="login-box">
        <h1>로그인</h1>
        <form id="loginForm" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="form-group">
                <input type="text" name="userNm" id="userNm" placeholder="이름" required />
                <input type="text" name="userId" id="userId" placeholder="아이디" required />
            </div>
            <div class="form-group phone-group">
                <input type="text" id="phoneNum" name="phoneNum" placeholder="-없이 숫자만 입력해주세요." required pattern="\d{10,11}" />
                <button type="button" id="sendBtn">인증번호 발송</button>
            </div>
            <div class="form-group auth-group phone-group hidden" id="authCodeGroup">
                <div id="authSection">
                    <input class="mrg-top10" type="text" id="authCode" placeholder="인증번호 6자리 입력">
                    <span id="timer">03:00</span>
                    <button type="button" id="verifyBtn">인증확인</button>
                </div>
            </div>
            <div class="form-group">
                <input class="mrg-top10" type="password" name="password" id="password" placeholder="비밀번호" required />
                <input class="" type="password" name="passwordConfirm" id="passwordConfirm" placeholder="비밀번호 확인" required />
            </div>
            <p class="hidden" id="resultMessage"></p>

            <button type="submit" id="reRegPw" class="mrg-top10">비밀번호 재등록</button>
        
        
            <div class="links">
                <a href="/findId">아이디 찾기</a> |
                <a href="/findPassword">비밀번호 찾기</a>
            </div>
        
            <div class="signup">
                아직 회원이 아니신가요? <a href="/user02">회원가입 하기</a>
            </div>
        
            <div class="homepage-link">
                <a href="/">메인 홈페이지로 돌아가기</a>
            </div>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
    <script th:inline="javascript">
        const form = document.getElementById('smsForm');
        const resultMessage = document.getElementById('resultMessage');
        const sendBtn = document.getElementById('sendBtn');
        const authCodeGroup = document.getElementById('authCodeGroup');
        const authSection = document.getElementById('authSection');
        const phoneInput = document.getElementById('phoneNum');
        const authCodeInput = document.getElementById('authCode');
        const verifyBtn = document.getElementById('verifyBtn');
        const timerDisplay = document.getElementById('timer');
        const joinButton = document.getElementById('joinButton');
        let verifyBtnCode = false; // 인증번호 확인 버튼 클릭 여부를 추적하는 변수
        const csrfHeader = /*[[${_csrf.headerName}]]*/ '';
        const csrfToken = /*[[${_csrf.token}]]*/ '';
    
        const requestHeaders = {};
    
        if (csrfHeader && csrfToken) {
            requestHeaders[csrfHeader] = csrfToken;
        }
        
        sendBtn.addEventListener('click', function() {
            const phoneNumber = document.getElementById('phoneNum').value;
    
            if(!phoneNumber) {
                alert("번호를 입력해주세요.");
                return;
            }
            
            fetch('/auth/sendCodeFindId', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                    ...requestHeaders  // 반드시 객체 병합 형태로 추가
                },
                credentials: 'include',  // 이 옵션이 중요합니다!
                body: new URLSearchParams({ phoneNumber: phoneNumber })
            })
            .then(response => response.text()) // json() 대신 text()로 받기
            .then(data => {
                console.log("서버 응답 데이터:", data);
                // 서버에서 리턴한 문자열에 '성공'이라는 글자가 포함되어 있는지 확인
                if (data.includes("성공") || data === "Test OK") {
                    resultMessage.style.color = 'blue';
                    resultMessage.textContent = '인증번호가 발송되었습니다.';
                    document.getElementById('resultMessage').style.display = 'block';
                    startTimer(); 
                } else {
                    resultMessage.style.color = 'red';
                    resultMessage.textContent = '발송 실패: ' + data;
                }
            })
            .catch(error => {
                console.error('Error:', error);
                resultMessage.textContent = '서버와 통신 중 오류가 발생했습니다.';
            });

            resultMessage.style.color = 'blue';
            resultMessage.textContent = '인증번호가 발송되었습니다.';
            document.getElementById('resultMessage').style.display = 'block';
            startTimer();
        });
    
        let timeLeft = 180; // 3분
        let timerInterval;
    
        function startTimer() {
            const authCodeGroup = document.getElementById('authCodeGroup');
    
            clearInterval(timerInterval);
            authCodeGroup.classList.remove('hidden');
            timerInterval = setInterval(() => {
                let minutes = Math.floor(timeLeft / 60);
                let seconds = timeLeft % 60;
                document.getElementById('timer').textContent = 
                    `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    alert("인증 시간이 만료되었습니다. 다시 시도해주세요.");
                }
                timeLeft--;
            }, 1000);
        }
    
        // 인증확인 버튼 클릭 이벤트
        document.getElementById('verifyBtn').addEventListener('click', () => {
            const inputCode = document.getElementById('authCode').value;
            const phoneNumber = document.getElementById('phoneNum').value;
            fetch('/auth/verifyCode', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded', ...requestHeaders },
                body: new URLSearchParams({ phoneNumber: phoneNumber, inputCode: inputCode })
            })
            .then(res => res.text())
            .then(data => {
                if (data === "인증 성공") {
                    verifyBtnCode = true;
                    clearInterval(timerInterval);
                    resultMessage.textContent = "인증되었습니다.";
                    // 추가로 인증번호 입력창과 버튼을 비활성화하거나 숨길 수도 있습니다.
                    document.getElementById('phoneNum').disabled = true;
                    // document.getElementById('sendCode').disabled = true;
                    document.getElementById('authCode').disabled = true;
                    document.getElementById('verifyBtn').disabled = true;
                } else {
                    alert(data);
                }
            });
        });
        
        const reRegPw = document.getElementById("reRegPw");
        const loginForm = document.getElementById("loginForm");

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const userNm = document.getElementById('userNm').value;
            const phoneNumber = document.getElementById('phoneNum').value;

            // 2. FormData 생성
            const formData = new URLSearchParams(new FormData(loginForm));

            if (typeof verifyBtnCode === 'undefined' || verifyBtnCode === false) {
                alert("인증 확인 후 패스워드 재 등록 해주세요.");
                return;
            }

            const params = new URLSearchParams();
            params.append('userNm', userNm);
            params.append('phoneNum', phoneNumber); // 자바의 @RequestParam("phoneNum")과 일치
            fetch('/reRegPw', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded', ...requestHeaders },
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                console.log("data : " + JSON.stringify(data));
                if(data.success == true){
                    alert("비밀번호 변경이 성공 되었습니다.\n로그인 페이지로 이동합니다.")
                    window.history.back();
                }
            })
            .catch(error => {
                console.error('Error:', error);
                resultMessage.textContent = '서버와 통신 중 오류가 발생했습니다.';
            });
        });
    </script>
</body>
</html>

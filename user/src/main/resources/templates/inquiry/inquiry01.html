<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
                xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
                layout:decorate="~{layouts/base_layout}">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>공지사항</title>
    <link rel="stylesheet" href="/css/inquiry_style.css" />
    <style>
    /* 메인 콘텐츠 스타일 */
    .main-content {
        width: 90%;
        margin: 0 auto;
        box-sizing: border-box;
        min-height: 100vh;
        background-color: #fff;
    }

    /* 공지사항 테이블 스타일 */
    .notice-table {
        float: right;
        min-width: 80%;
        border-collapse: collapse; /* 테이블 셀 경계선 병합 */
        margin-bottom: 25px;
        /* margin-right: 100px; */
    }

    .notice-table th, .notice-table td {
        padding: 20px 10px;
        border-bottom: 1px solid #eee;
        text-align: center;
        font-size: 20px;
    }

    .notice-table th {
        /* background-color: #f2f2f2; */
        font-weight: 600;
        color: #555;
        white-space: nowrap; /* 제목 등 셀 너비 유지 */
    }

    /* 1. 제목 칸 설정 */
.notice-table td.title {
    max-width: 200px; /* 화면 크기에 따라 적절히 조절 (예: 150px~250px) */
    padding: 10px;
    vertical-align: middle;
}

/* 2. 실제 스크롤이 발생하는 박스 */
.title-scroll-box {
    display: block;
    width: 100%;           /* 부모 td 너비에 맞춤 */
    overflow-x: auto;      /* 가로 방향으로 넘치면 스크롤 생성 */
    white-space: nowrap;   /* 글자가 아래로 떨어지지 않게 한 줄로 고정 */
    -webkit-overflow-scrolling: touch; /* 모바일에서 부드러운 스크롤 */
    
    /* 텍스트 정렬은 원하는 대로 */
    text-align: left; 
}

/* 3. 스크롤바 디자인 (모바일에서 깔끔하게 보이도록 숨기거나 최소화) */
.title-scroll-box::-webkit-scrollbar {
    height: 2px; /* 아주 얇게 설정 */
}
.title-scroll-box::-webkit-scrollbar-thumb {
    background: rgba(0,0,0,0.1); /* 살짝 보일듯 말듯한 회색 */
    border-radius: 10px;
}

    .notice-table tr:hover {
        background-color: #fdfdfd;
    }

    .notice-title{
        font-size: 40px;
        font-weight: 700;
        margin: 5%;
        padding-bottom: 10px;
        color: #111;
    }
    

    .agreement-wrapper {
        max-width: 100%;
    }

    /* 제목 부분 스타일 */
    .accordion-header {
        display: flex;
        align-items: center;
        padding: 15px 0;
        cursor: pointer;
        font-size: 16px;
        color: #333;
    }

    .arrow {
        margin-left: 10px;
        transition: transform 0.3s;
        font-size: 12px;
    }

    /* 아코디언 열렸을 때 화살표 회전 */
    .agreement-wrapper.active .arrow {
        transform: rotate(180deg);
    }

    /* 내용 숨기기 및 애니메이션 */
    .accordion-content {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.3s ease-out;
    }

    .agreement-wrapper.active .accordion-content {
        max-height: 500px; /* 내용이 다 보일 정도로 충분한 높이 */
    }

    /* 동의 항목 내부 스타일 */
    .agreement-container {
        padding: 10px 0 20px 20px;
    }

    .check-row {
        display: flex;
        align-items: center;
        margin-bottom: 12px;
    }

    .main-check {
        display: block;
    }

    .check-row input {
        width: 18px;
        height: 18px;
        margin-right: 10px;
    }

    .terms-summary {
        background: #f9f9f9;
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 15px;
        font-size: 13px;
        color: #666;
        margin: 10px 0 20px 28px;
    }

hr { border: 0; border-top: 1px solid #eee; margin: 15px 0; }
    </style>
</head>
<body>
<!-- <th:block th:replace="~{fragments/navigator :: main-navigator}" /> -->
<main layout:fragment="content">
    <div class="main-side-content">
        <div class="container">
            <th:block th:replace="~{fragments/noticeSidebar :: sidebarMenu}" />
        </div>
        <h1 class="notice_title_list consultation-title">행사 문의</h1>
        <div class="form-container">
            <form id="supportForm" th:action="@{/support/submit}" method="post">
                <div class="input-grid">
                    <div class="input-group">
                        <label class="input-label">업체명</label>
                        <input type="text" name="companyNm" class="form-input" th:value="${userName}" placeholder="행사명을 입력해주세요">
                    </div>

                    <div class="input-group">
                        <label class="input-label">전화번호 <span class="label-sub">(-제외)</span></label>
                        <input type="number" name="phoneNum" class="form-input" placeholder="전화번호를 입력해주세요">
                    </div>

                    <div class="input-group">
                        <label class="input-label">결제일</label>
                        <input type="date" name="payDate" class="form-input" placeholder="결제일을 입력해주세요">
                    </div>

                    <div class="input-group">
                        <label class="input-label">집결시간</label>
                        <input type="tel" name="gatheringTime" class="form-input" placeholder="예) 2026-01-01 - 2026-01-02 오후 1시">
                    </div>

                    <div class="input-group">
                        <label class="input-label">단가</label>
                        <input type="tel" name="salary" class="form-input" placeholder="단가를 입력해주세요">
                    </div>

                    <div class="input-group">
                        <label class="input-label">복장</label>
                        <input type="tel" name="costume" class="form-input" placeholder="복장을 입력해주세요">
                    </div>

                    <div class="input-group">
                        <label class="input-label">주소</label>
                        <input type="tel" name="address" class="form-input" placeholder="복장을 입력해주세요">
                    </div>

                    <div class="input-group">
                        <label class="input-label">타입</label>
                        <!-- <input type="tel" name="inquiryType" class="form-input" placeholder="복장을 입력해주세요"> -->
                        <select name="inquiryType" class="form-input">
                            <option value="01">경호</option>
                            <option value="02">진행</option>
                            <option value="03">수행</option>
                        </select>
                    </div>
                </div>

                <div class="input-grid-title">
                    <div class="input-group">
                        <label class="input-label">행사명</label>
                        <input type="text" name="campaignTitle" class="form-input" placeholder="제목을 입력해주세요">
                    </div>
                    </div>
                <div class="input-group">
                    <label class="input-label">행사 내용</label>
                    <textarea name="content" class="form-textarea" 
                            placeholder="상담 가능 시간 (예. 오후 1시~3시 사이):&#10;&#10;상세 문의 내용 (예. 체험단 단가 문의드립니다.):"></textarea>
                </div>

                <div class="agreement-section">
                    <!-- <label class="agree-item">
                        <input type="checkbox" name="agree" required>
                        <span class="agree-link">개인정보 수집·이용 및 광고성 정보 수신 전체 동의</span>
                    </label> -->

                    


                    <div class="agreement-wrapper">
                        <div class="accordion-header" id="main-accordion-btn">
                            <strong>개인정보 수집 및 이용 동의</strong>
                            <span class="arrow">∨</span>
                        </div>
                        <div class="" id="main-accordion-content">
                            <div class="agreement-container">
                                <div class="check-row main-check">
                                    <input type="checkbox" id="check-all">
                                    <label for="check-all">개인정보 수집·이용 및 광고성 정보 수신 전체 동의</label>
                                </div>
                            </div>
                        </div>
                        <div class="accordion-content" id="main-accordion-content">
                            <div class="agreement-container">
                                <div class="check-row">
                                    <input type="checkbox" id="check-required" class="sub-check" name="agree" required>
                                    <label for="check-required">[필수] 개인정보보호정책에 동의합니다.</label>
                                </div>
                                <div class="terms-summary">
                                    <p><strong>(목적)</strong> 행사 상담 및 견적 안내</p>
                                    <p><strong>(항목)</strong> 업체명, 전화번호, 행사 내용</p>
                                    <p><strong>(보유 및 이용기간)</strong> 상담 완료 후 1년 보관</p>
                                </div>
                                <div class="check-row">
                                    <input type="checkbox" id="check-optional" class="sub-check" name="agreeOpt">
                                    <label for="check-optional">[선택] 광고성 정보 수신 동의: 이벤트 소식 받기</label>
                                </div>
                            </div>
                        </div>
                    </div>








                </div>

                <div class="submit-btn-wrap">
                    <button type="submit" class="submit-btn">문의하기</button>
                </div>
            </form>
        </div>
    </div>
    <script th:inline="javascript">
        document.addEventListener('DOMContentLoaded', function() {
            const supportForm = document.getElementById('supportForm');
        
            supportForm.addEventListener('submit', function(e) {
                e.preventDefault(); // 기본 폼 제출 동작 막기
        
                // 1. 데이터 수집
                const formData = new FormData(supportForm);
                const data = Object.fromEntries(formData.entries());
                console.log('Collected Data:', JSON.stringify(data)); // 수집된 데이터 확인
                // 2. CSRF 토큰 정보 (Meta 태그에 설정해둔 값 읽기)
                const token = document.querySelector('meta[name="_csrf"]')?.content;
                const header = document.querySelector('meta[name="_csrf_header"]')?.content;
        
                // 3. fetch 전송
                fetch('/inquiry02', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        // [header]: token // CSRF 토큰 헤더 추가
                    },
                    body: JSON.stringify(data)
                })
                .then(response => {
                    if (response.ok) {
                        alert('문의가 정상적으로 접수되었습니다.');
                        location.href = '/inquiry01'; // 리스트 페이지로 이동
                    } else {
                        alert('전송 중 오류가 발생했습니다. 다시 시도해주세요.');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('서버와의 통신에 실패했습니다.');
                });
            });
        });
        // 1. 아코디언 토글 기능
        const wrapper = document.querySelector('.agreement-wrapper');
        const header = document.querySelector('#main-accordion-btn');

        header.addEventListener('click', () => {
            wrapper.classList.toggle('active');
        });

        // 2. 전체 동의 체크박스 로직
        const checkAll = document.querySelector('#check-all');
        const subChecks = document.querySelectorAll('.sub-check');

        checkAll.addEventListener('change', (e) => {
            subChecks.forEach(cb => cb.checked = e.target.checked);
        });

        subChecks.forEach(cb => {
        cb.addEventListener('change', () => {
                const isAllChecked = Array.from(subChecks).every(c => c.checked);
                checkAll.checked = isAllChecked;
            });
        });
        </script>
</main>
</body>
</html>

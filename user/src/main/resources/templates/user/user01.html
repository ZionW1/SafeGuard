    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>로그인</title>
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>
    <div class="login-box">
        <h1>로그인</h1>
        <form action="/login" id="loginForm" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <input type="hidden" name="targetUrl" th:value="${param.target}" />

            <label for="userid">아이디:</label>
            <input type="text" id="userId" name="userId" autocomplete="username" required />
        
            <label for="password">비밀번호:</label>
            <input type="password" id="password" name="password" autocomplete="current-password" required />

            <button type="submit">로그인</button>
            <div class="checkbox-group">
                <!-- <label><input type="checkbox" name="rememberId" /> 아이디 저장</label>
                <label><input type="checkbox" name="autoLogin" /> 자동 로그인</label> -->
                <div class="item">
                    <label><input class="form-check-input" type="checkbox" name="remember-id" id="remember-id-check" th:checked="${rememberId}"/><span class="mrg10-left">아이디 저장</span></label>
                </div>
                <div class="item">
                    <label><input class="form-check-input" type="checkbox" name="auto-login" id="remember-me-check" /><span class="mrg10-left" value="true">자동 로그인</span></label>
                </div>
            </div>
        
            <div class="links">
                <a href="/findId">아이디 찾기</a> |
                <a href="/findPassword">비밀번호 찾기</a>
            </div>
        
            <div class="signup">
                아직 회원이 아니신가요? <a href="/user02">회원가입 하기</a>
            </div>
        
            <div class="homepage-link">
                <a href="/">메인 홈페이지로 돌아가기</a>
            </div>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>

<script th:inline="javascript">
    const loginForm = document.getElementById('loginForm');
    
    loginForm.addEventListener('submit', (e) => {
        e.preventDefault();

        // 요소 가져오기
        const userId = document.getElementById('userId').value;
        const password = document.getElementById('password').value;
        const rememberIdChecked = document.getElementById('remember-id-check').checked;
        const rememberMeChecked = document.getElementById('remember-me-check').checked;
        const csrfToken = document.querySelector('meta[name="_csrf"]').getAttribute('content');
        
        // const isAutoLogin = document.getElementById('remember-me-check').checked;
        // formData.append('auto-login', isAutoLogin);

        const formData = new URLSearchParams();
        formData.append('userId', userId);
        formData.append('password', password);
        
        // 아이디 저장 체크 시 서버로 전송
        

        if (rememberIdChecked) {
            formData.append('remember-id', 'on');
        }

        // 명칭을 SecurityConfig와 동일하게 'auto-login'으로 변경합니다.
        if (rememberMeChecked) {
            formData.append('auto-login', 'on'); 
        }

        fetch('/login', {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/x-www-form-urlencoded',
                'X-CSRF-TOKEN': csrfToken
            },
            body: formData
        })
        .then(async response => {
            if (response.ok) {
                const targetUrl = await response.text();
                
                // ❌ 이 부분이 에러를 만들고 있었습니다. 지우거나 아래처럼 console.log로 바꿔주세요!
                // log.info("서버가 가라고 한 최종 주소: " + targetUrl); 
                console.log("🎯 서버가 안내해준 최종 이동 목적지:", targetUrl); 

                if (targetUrl) {
                    window.location.href = targetUrl;
                } else {
                    window.location.href = '/';
                }
            } else {
                const data = await response.json();
                throw new Error(data.error || '로그인에 실패했습니다.');
            }
        })
        .catch(err => {
            alert(err.message);
        });
    });
</script>
</body>

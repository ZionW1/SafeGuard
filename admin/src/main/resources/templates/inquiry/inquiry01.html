<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <th:block th:replace="~{fragments/csrfFragments :: metaCsrf}"></th:block>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <title>Document</title>
</head>
<body>
    <div class="admin-container">
        <th:block th:replace="~{fragments/sidebar :: sidebarFragment}"></th:block>
        <div class="main-content">
            <h1><a th:href="@{/faq01}">FAQ</a></h1>
            <form class="optionForm" th:action="@{/faq01}" method="get" id="form">
                <th:block th:replace="~{fragments/csrfFragments :: inputCsrf}"></th:block>
                <select name="code" class="wdt160">
                    <option value="0" th:selected="${option.code==0}">전체</option>
                    <option value="1" th:selected="${option.code==1}">제목</option>
                    <option value="2" th:selected="${option.code==2}">내용</option>
                    <option value="3" th:selected="${option.code==3}">타입</option>
                </select>
                <select name="orderCode" id="order-code" class="wdt160">
                    <option value="0" th:selected="${option.orderCode == 0}">최신순</option>
                </select>
                <input type="text" name="keyword" placeholder="검색어를 입력해 주세요." th:value="${param.keyword}" style="width: 160px;">
                <input class="optionSubmit" type="submit" value="검색">
            </form>
            <table class="data-grid" border="1">
                <thead>
                    <th style="width: 50px; text-align: center;">No</th>
                    <th style="text-align: center;">제목</th>
                    <th style="text-align: center;">컴퍼니</th>
                    <th style="text-align: center;">폰넘버</th>
                    <th style="text-align: center;">타입</th>
                    <th style="width: 100px; text-align: center;">생성일</th>
                </thead>
                <tbody>
                    <th:block th:if="${supportList.isEmpty()}">
                        <tr>
                            <td colspan="3" align="center">조회된 데이터가 없습니다.</td>
                        </tr>
                    </th:block>
                    <th:block th:each="support, stat : ${supportList}">
                        <!-- <a th:href="|/admin/campaign/select?id=${campaign.id}|"> -->
                        <tr th:onclick="|location.href='@{/support02(inquiryId=${support.inquiryId})}'|">
                            <td style="text-align: center;" ><span th:text="${stat.size - stat.index}"></span></td>
                            <td><span th:text="${support.campaignTitle}"></span></td>
                            <td><span th:text="${support.companyNm}"></span></td>
                            <td><span th:text="${support.phoneNum}"></span></td>
                            <td><span th:text="${support.supportType}"></span></td>
                            <td style="text-align: center;" ><span th:text="${#temporals.format(support.createdAt, 'yyyy-MM-dd')}"></span></td>
                        </tr>
                    </th:block>
                </tbody>
            </table>
            <div class="parent">
                <div class="child">
                <a th:href="@{${pageUrl} + '&page=' + ${page.first}}">[처음]</a>
                
                <th:block th:if="${page.page != page.first }">
                    <a th:href="@{${pageUrl} + '&page=' + ${page.prev}}">[이전]</a>
                </th:block>
                <th:block th:each="no : ${#numbers.sequence(page.start, page.end)}">

                    <th:block th:if="${page.page == no}">
                        <b><span th:text="${no}"></span></b>
                    </th:block>
                    <th:block th:if="${page.page != no}">
                        <a th:href="@{${pageUrl} + '&page='+${no}}" th:text="${no}"></a>
                    </th:block>
                </th:block>
                <th:block th:if="${page.page != page.last }">
                    <a th:href="@{${pageUrl} + '&page=' + ${page.next}}">[다음]</a>
                </th:block>
                <a th:href="@{${pageUrl} + '&page=' + ${page.last}}">[마지막]</a>
            </div>
            
            </div>
            <a th:href="@{/faq03}" class="insert">등록</a>
        </div>
    </div>
    <th:block th:replace="~{fragments/footer :: mainFooter}"></th:block>
    <script th:src="@{/js/common.js}"></script>
</body>
</html>

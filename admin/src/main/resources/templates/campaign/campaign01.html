<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <title>캠페인 목록 요약</title>
        <link rel="stylesheet" th:href="@{/css/style.css}">
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="_csrf" th:content="${_csrf.token}"/>
        <meta name="_csrf_header" th:content="${_csrf.headerName}"/>    
        <th:block th:replace="~{fragments/csrfFragments :: metaCsrf}"></th:block>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.3/js/lightbox-plus-jquery.min.js"></script>
    </head>
    <body>
        <div class="admin-container">
            <div th:if="${user.userId} == 'semiAdmin'">
                <div th:replace="~{fragments/sidebar :: sidebarFragment-semi}"></div>
            </div>
            <div th:unless="${user.userId} == 'semiAdmin'">
                <div th:replace="~{fragments/sidebar :: sidebarFragment}"></div>
            </div>
            <div class="main-content">
                
                <h1><a th:href="@{/campaign01}">캠페인 목록 요약</a></h1>
                <form class="optionForm" th:action="@{/campaign01}" method="get" id="form">
                    <div th:replace="~{fragments/csrfFragments :: inputCsrf}"></div>
                    <select name="code" class="wdt160">
                        <option value="0" th:selected="${option.code==0}">전체</option>
                        <option value="1" th:selected="${option.code==1}">제목</option>
                        <option value="2" th:selected="${option.code==2}">주소</option>
                        <option value="3" th:selected="${option.code==3}">리더자</option>
                    </select>
                    <select name="orderCode" id="order-code" class="wdt160">
                        <option value="0" th:selected="${option.orderCode == 0}">최신순</option>
                        <option value="1" th:selected="${option.orderCode == 1}">제목순</option>
                    </select>
                    <input type="text" name="keyword" placeholder="검색어를 입력해 주세요." th:value="${param.keyword}" style="width: 160px;">
                    <input class="optionSubmit" type="submit" value="검색">
                </form>
                <table class="info_table campaign_Table" border="1">
                    <colgroup>
                        <col width="5%"></col>
                        <col width="*"></col>
                        <col width="10%"></col>
                        <col width="10%"></col>
                        <col width="10%"></col>
                        <col width="8%"></col>
                        <col width="8%"></col>
                        <col width="7%"></col>
                        <col width="15%"></col>
                        <col width="15%"></col>
                    </colgroup>
                    <thead>
                        <th>ID</th>
                        <th>캠페인명</th>
                        <th>캠페인신청</th>
                        <th>명단보기</th>
                        <th>상세보기</th>
                        <th>신청자수</th>
                        <th>모집인원</th>
                        <th>인솔자</th>
                        <th>일정</th>
                        <th>지역</th>
                    </thead>
                    <tbody>
                        <th:block th:if="${campaignsList.isEmpty()}">
                            <tr>
                                <td colspan="9" align="center">조회된 데이터가 없습니다.</td>
                            </tr>
                        </th:block>
                    </div>
                        <th:block th:each="campaign, stat : ${campaignsList}">
                            <tr>
                                <td><span th:text="${campaign.campaignId}"></span></td>
                                <td th:text="|${campaign.campaignTitle} (${campaign.timeSegment == 'DAY' || campaign.timeSegment == null ? '주간' : '야간'})|"></td>
                                <td class="pointer">
                                    <a th:class="|statusInfoChange applyConfirmButotn|" 
                                    href="#" 
                                    th:data-url="@{/campaignPopup01/{campaignId}(campaignId=${campaign.campaignId})}"
                                    th:onclick="|openPopup(this.dataset.url, ${stat.index}); return false;|">캠페인신청</a>
                                </td>
                                <td class="pointer">
                                    <a th:href="|/apply/applyConfirm/${campaign.campaignId}|" target="_blank">명단보기</a>
                                </td>
                                <td class="pointer">
                                    <a th:href="@{/campaign02(id=${campaign.campaignId})}" target="_blank">상세보기</a>
                                </td>
                                <td><span th:text="${campaign.applicantsNum}"></span></td>
                                <td><span th:text="${campaign.recruitmentNum}"></span></td>
                                <td><span th:text="${campaign.userNm}"></span></td>
                                <td><span th:text="${campaign.eventPeriodStr != null ? #temporals.format(campaign.eventPeriodStr, 'yyyy.MM.dd') : ''}"></span>~<span th:text="${campaign.eventPeriodStr != null ? #temporals.format(campaign.eventPeriodEnd, 'yyyy.MM.dd') : ''}"></span></span></td>
                                <td><span th:text="${campaign.placeAddr}"></span></td>
                            </tr>
                        </th:block>
                    </tbody>
                </table>
                <div class="parent">
                    <div class="child">
                        <a th:href="@{${pageUrl} + '&page=' + ${page.first}}">[처음]</a>
                        <th:block th:if="${page.page != page.first }">
                            <a th:href="@{${pageUrl} + '&page=' + ${page.prev}}">[이전]</a>
                        </th:block>
                        <th:block th:each="no : ${#numbers.sequence(page.start, page.end)}">
                            <th:block th:if="${page.page == no}">
                                <b><span th:text="${no}"></span></b>
                            </th:block>
                            <th:block th:if="${page.page != no}">
                                <a th:href="@{${pageUrl} + '&page='+${no}}" th:text="${no}"></a>
                            </th:block>
                        </th:block>
                        <th:block th:if="${page.page != page.last }">
                            <a th:href="@{${pageUrl} + '&page=' + ${page.next}}">[다음]</a>
                        </th:block>
                        <a th:href="@{${pageUrl} + '&page=' + ${page.last}}">[마지막]</a>
                    </div>
                </div>
                <a th:href="@{/campaign03}" class="insert">등록</a>
            </div>
        </div>
        <div id="modalPopup" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9999; align-items:center; justify-content:center;">
            <div style="background:#fff; padding:20px; border-radius:8px; width:400px; max-width:90%; position:relative;">
                <span onclick="closeModal();" style="position:absolute; top:10px; right:15px; cursor:pointer; font-size:20px; font-weight:bold;">&times;</span>
                <div id="modalContent"></div>
            </div>
        </div>
        <div th:replace="~{fragments/footer :: mainFooter}"></div>
        <div th:replace="~{fragments/sidebar :: adminScript}"></div>
    </body>
    <script th:inline="javascript">
        let campaign = /*[[${campaignsList}]]*/ null;
        const csrfToken = document.querySelector('meta[name="_csrf"]')?.content;
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.content;
        let selectIndex = "";
        // // 리스트 전체를 한 번에 콘솔에 출력
        // console.log(campaign);

        function chkBoxSelect() {
            const checkboxes = document.querySelectorAll('.user_Chk');
            const chkPcs = document.getElementById('chkPcs');
            const recPcs = document.getElementById('recPcs');
            const recNum = campaign[selectIndex].recruitmentNum;
            // 💡 [추가] 팝업창이 뜨자마자 '현재 체크되어 있는 개수'를 바로 span에 집어넣습니다.
            const initialCount = document.querySelectorAll('.user_Chk:checked').length;
            if (chkPcs) {
                chkPcs.textContent = initialCount;
                recPcs.textContent = recNum;
            }

            // 그 이후에 유저가 클릭할 때마다 숫자가 바뀌도록 감시자를 붙입니다.
            checkboxes.forEach(checkbox => {
                checkbox.addEventListener('change', () => {
                    const checkedCount = document.querySelectorAll('.user_Chk:checked').length;
                    if (chkPcs) {
                        chkPcs.textContent = checkedCount; // span에 값 갱신
                    }
                });
            });
        }

        function openPopup(url, index) {
            // const campaignTItle = document.getElementById("campaignTitle").value;
            selectIndex = index;
            var sendData = {
                campaignTitle: campaign[index].campaignTitle,
                recruitmentNum: campaign[index].recruitmentNum,
                applicantsNum: campaign[index].applicantsNum,
                eventPeriodStr: campaign[index].eventPeriodStr,
                eventPeriodEnd: campaign[index].eventPeriodEnd
            };
            
            // console.log("sendDate" + JSON.stringify(sendData))

            // 1. 서버에 해당 url의 HTML 내용을 요청
            fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    [csrfHeader]: csrfToken
                },
                body: JSON.stringify(sendData)
            })
            .then(response => {
                if (!response.ok) throw new Error('네트워크 응답 실패');
                return response.text(); // 페이지를 텍스트(HTML)로 읽어옴
            })
            .then(html => {
                // 2. 모달 컨텐츠 영역에 서버에서 가져온 HTML 주입
                document.getElementById('modalContent').innerHTML = html;
                // // 3. 모달 display를 flex로 바꿔서 화면에 노출
                document.getElementById('modalPopup').style.display = 'flex';
                
                // 🔥 [추가] 이미 신청한 유저 체크박스 자동 선택 및 비활성화 로직
                const appliedBoxes = document.querySelectorAll('.user_Chk.already-applied');

                appliedBoxes.forEach(cb => {
                    cb.checked = true;  // 자동으로 체크 표시 활성화
                    // cb.disabled = true; // 유저가 임의로 체크 해제하지 못하도록 비활성화
                    
                    // (시각적 효과) 해당 행을 흐리게 만들어서 이미 신청 완료된 상태임을 표시
                    const row = cb.closest('tr');
                    if (row) {
                        row.style.backgroundColor = '#f8f9fa';
                        row.style.color = '#bbb';
                    }
                });
                chkBoxSelect();
            })
            .catch(error => {
                console.error('모달 로드 중 에러 발생:', error);
                alert('페이지를 불러오는 중 오류가 발생했습니다.');
            });
        }

        // 💡 [여기에 추가] 한 번만 등록해 두면 팝업이 켜진 후 배경 클릭 시 언제든 작동합니다.
        document.getElementById('modalPopup').addEventListener('click', function(e) {
            if (e.target === this) {
                this.style.display = 'none';
            }


            function inputDates(idx) {
                const leaderList = /*[[${leaderList}]]*/ [];

                const selectPhoneNumber = leaderList[idx].phoneNum;
                const selectNo = leaderList[idx].id;
                const leaderId = leaderList[idx].userId;

                document.getElementById("leaderPhone").value = selectPhoneNumber;
                document.getElementById("leaderNo").value = selectNo;
                document.getElementById("leaderCode").value = leaderList[idx].id;
                document.getElementById("leaderId").value = leaderId;
            }

        });

        function closeModal() {
            // 모달 닫기 및 컨텐츠 초기화
            const modal = document.getElementById('modalPopup');
            if(modal) 
                modal.style.display = 'none';

            $('#modalContent').html(''); // 닫을 때 내부 내용 초기화 (중복 방지 핵심!)
            // document.getElementById('significantModal').style.display = 'none';
            // document.getElementById('modalContent').innerHTML = '';
        }

        function changeDate(element) {
            // 사용자가 선택한 option의 value 값을 가져옴 ('ALL' 또는 '2026-07-06' 등)
            const campaignId = campaign[selectIndex].campaignId;
            const selectedValue = element.value; 
            let applyDate = "";

            console.log("선택된 값:", selectedValue);
            if(!selectedValue) 
                return;

            const url = `/admin/chgDate/${campaignId}`;
            if (selectedValue === "ALL") {
                applyDate = "ALL"; // 자바단에 'ALL'이라는 문자열을 그대로 전송
            } else {
                applyDate = selectedValue; // '2026-07-06' 같은 실제 날짜 전송
            }
            
            var sendData = {
                campaignTitle: campaign[selectIndex].campaignTitle,
                recruitmentNum: campaign[selectIndex].recruitmentNum,
                applicantsNum: campaign[selectIndex].applicantsNum,
                eventPeriodStr: campaign[selectIndex].eventPeriodStr,
                eventPeriodEnd: campaign[selectIndex].eventPeriodEnd,
                applyDateS: applyDate
            };

            fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    [csrfHeader]: csrfToken
                },
                body: JSON.stringify(sendData)
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error("네트워크 응답에 문제가 있습니다.");
                }
                // 서버에서 HTML 조각을 받아온다면 response.text(), JSON을 받아온다면 response.json()
                return response.json(); 
            })
            .then(data => {
                // 1. 데이터를 꽂아 넣을 대상(tbody) 가져오기
                const tableBody = document.getElementById("userList");
                
                // 2. 누적할 HTML 문자열 초기화
                let htmlRows = "";
                
                // 3. 만약 받아온 데이터가 비어있다면 처리
                if (!data || data.length === 0) {
                    htmlRows = `<tr><td colspan="3" style="text-align:center;">조회된 회원 정보가 없습니다.</td></tr>`;
                } else {
                    // 4. 데이터 배열(data)을 돌면서 기존 타임리프 구조 그대로 그리기
                    data.forEach(userInfo => {
                        // userInfo.isApplied가 'Y'이면 클래스명 추가하고 아니면 빈값
                        const classAppend = (userInfo.isApplied === 'Y') ? 'already-applied' : '';
                        const isChecked = (userInfo.isApplied === 'Y') ? 'checked' : '';
                        htmlRows += `
                            <tr>
                                <td>
                                    <input type="hidden" value="${userInfo.userId}" class="user_Id" name="userId">
                                    <input type="checkbox" value="${userInfo.id}" 
                                        class="user_Chk ${classAppend}" 
                                        name="Attendance" ${isChecked}>
                                </td>
                                <td><span>${userInfo.userNm}</span></td>
                                <td><span>${userInfo.phoneNum}</span></td>
                            </tr>
                        `;
                    });
                    const appliedBoxes = document.querySelectorAll('.user_Chk.already-applied');

                    appliedBoxes.forEach(cb => {
                        cb.checked = true;  // 자동으로 체크 표시 활성화
                        // cb.disabled = true; // 유저가 임의로 체크 해제하지 못하도록 비활성화
                        
                        // (시각적 효과) 해당 행을 흐리게 만들어서 이미 신청 완료된 상태임을 표시
                        const row = cb.closest('tr');
                        if (row) {
                            row.style.backgroundColor = '#f8f9fa';
                            row.style.color = '#bbb';
                        }
                    });
                    chkBoxSelect();
                }
                
                // 5. 새로 만든 HTML 덩어리를 tbody에 덮어씌우기
                tableBody.innerHTML = htmlRows;
            })
            .catch(error => {
                console.error("데이터를 가져오는 중 오류 발생:", error);
                alert("정보를 불러오는데 실패했습니다.");
            });
        }

        function cancelCampaign(campaignId) {
            const timeSegment = campaign[selectIndex].timeSegment; // 혹은 해당 캠페인의 timeSegment 값
            // 1. 팝업창이 열렸을 당시 '이미 신청 상태였던' 유저들의 No 목록 (already-applied 클래스 활용)
            const appliedUsers = [];
            document.querySelectorAll('.user_Chk.already-applied').forEach(cb => {
                appliedUsers.push(cb.value);
            });

            // 2. 현재 체크박스에 '체크가 되어 있는' 유저들의 No 목록
            const checkedUsers = [];
            document.querySelectorAll('.user_Chk:checked').forEach(cb => {
                checkedUsers.push(cb.value);
            });

            console.log("appliedUsers : " + appliedUsers);
            console.log("checkedUsers : " + checkedUsers);
            
            // 3. 🔥 핵심: 기존에 신청했었는데(original), 현재 체크가 풀린(current에 없는) 유저 골라내기 (취소 대상자)
            const usersToCancel = appliedUsers.filter(userNo => !checkedUsers.includes(userNo));

            // 4. 새롭게 체크된 유저 골라내기 (신규 등록 대상자 - 필요시 사용)
            const usersToInsert = checkedUsers.filter(userNo => !appliedUsers.includes(userNo));

            console.log("취소할 유저 번호 목록:", usersToCancel);
            console.log("새로 등록할 유저 번호 목록:", usersToInsert);

            // ========================================================
            // 5. 서버에 취소 요청 보내기 (취소 대상자가 있을 때만)
            // ========================================================
            if (usersToCancel.length > 0) {
                const cancelData = {
                    campaignId: campaignId,
                    timeSegment: timeSegment,
                    userNos: usersToCancel, // [34, 43] 형태로 전송
                    eventPeriodStr: campaign[selectIndex].eventPeriodStr,
                    eventPeriodEnd: campaign[selectIndex].eventPeriodEnd
                    // 만약 날짜 정보도 필요하다면 dto에 맞게 추가 (예: eventPeriodStr, eventPeriodEnd 등)
                };

                fetch('/admin/userCancel', { // 본인의 Controller URL 확인
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        [csrfHeader]: csrfToken
                    },
                    body: JSON.stringify(cancelData)
                })
                .then(response => response.json())
                .then(data => {
                    console.log("취소 처리 결과 건수:", data.message);
                    alert("선택한 유저의 신청 취소가 완료되었습니다.");
                    location.reload(); // 화면 새로고침
                })
                .catch(error => {
                    console.error("취소 처리 중 에러:", error);
                });
            } else {
                alert("수정된 내역이 없습니다.");
            }
        }

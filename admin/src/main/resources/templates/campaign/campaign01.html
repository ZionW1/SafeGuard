<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <title>캠페인 목록 요약</title>
        <link rel="stylesheet" th:href="@{/css/style.css}">
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="_csrf" th:content="${_csrf.token}"/>
        <meta name="_csrf_header" th:content="${_csrf.headerName}"/>    
        <th:block th:replace="~{fragments/csrfFragments :: metaCsrf}"></th:block>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.3/js/lightbox-plus-jquery.min.js"></script>
    </head>
    <body>
        <div class="admin-container">
            <div th:if="${user.userId} == 'semiAdmin'">
                <div th:replace="~{fragments/sidebar :: sidebarFragment-semi}"></div>
            </div>
            <div th:unless="${user.userId} == 'semiAdmin'">
                <div th:replace="~{fragments/sidebar :: sidebarFragment}"></div>
            </div>
            <div class="main-content">
                
                <h1><a th:href="@{/campaign01}">캠페인 목록 요약</a></h1>
                <form class="optionForm" th:action="@{/campaign01}" method="get" id="form">
                    <div th:replace="~{fragments/csrfFragments :: inputCsrf}"></div>
                    <select name="code" class="wdt160">
                        <option value="0" th:selected="${option.code==0}">전체</option>
                        <option value="1" th:selected="${option.code==1}">제목</option>
                        <option value="2" th:selected="${option.code==2}">주소</option>
                        <option value="3" th:selected="${option.code==3}">리더자</option>
                    </select>
                    <select name="orderCode" id="order-code" class="wdt160">
                        <option value="0" th:selected="${option.orderCode == 0}">최신순</option>
                        <option value="1" th:selected="${option.orderCode == 1}">제목순</option>
                    </select>
                    <input type="text" name="keyword" placeholder="검색어를 입력해 주세요." th:value="${param.keyword}" style="width: 160px;">
                    <input class="optionSubmit" type="submit" value="검색">
                </form>
                <table class="info_table campaign_Table" border="1">
                    <colgroup>
                        <col width="5%"></col>
                        <col width="*"></col>
                        <col width="20%"></col>
                        <col width="10%"></col>
                        <col width="12%"></col>
                        <col width="5%"></col>
                        <col width="5%"></col>
                        <col width="10%"></col>
                        <col width="10%"></col>
                        <col width="5%"></col>
                    </colgroup>
                    <thead>
                        <th>ID</th>
                        <th>지역</th>
                        <th>캠페인명</th>
                        <th>인솔자</th>
                        <th>일정</th>
                        <th>신청자수</th>
                        <th>모집인원</th>
                        <th>명단보기</th>
                        <th>상세보기</th>
                        <th>캠페인신청</th>
                    </thead>
                    <tbody>
                        <th:block th:if="${campaignsList.isEmpty()}">
                            <tr>
                                <td colspan="9" align="center">조회된 데이터가 없습니다.</td>
                            </tr>
                        </th:block>
                    </div>
                        <th:block th:each="campaign : ${campaignsList}">
                            <tr>
                                <td><span th:text="${campaign.campaignId}"></span></td>
                                <td><span th:text="${campaign.placeAddr}"></span></td>
                                <td th:text="|${campaign.campaignTitle} (${campaign.timeSegment == 'DAY' || campaign.timeSegment == null ? '주간' : '야간'})|"></td>                                <td><span th:text="${campaign.userNm}"></span></td>
                                <td><span th:text="${campaign.eventPeriodStr != null ? #temporals.format(campaign.eventPeriodStr, 'yyyy.MM.dd') : ''}"></span>~<span th:text="${campaign.eventPeriodStr != null ? #temporals.format(campaign.eventPeriodEnd, 'yyyy.MM.dd') : ''}"></span></span></td>
                                <td><span th:text="${campaign.applicantsNum}"></span></td>
                                <td><span th:text="${campaign.recruitmentNum}"></span></td>
                                <td class="pointer">
                                    <a th:href="|/apply/applyConfirm/${campaign.campaignId}|" target="_blank">명단보기</a>
                                </td>
                                <td class="pointer">
                                    <a th:href="@{/campaign02(id=${campaign.campaignId})}" target="_blank">상세보기</a>
                                </td>
                                <td class="pointer">
                                    <!-- <a th:href="|/campaign02(id=${campaign.campaignId})|" target="_blank">신청하기</a> -->
                                    
                                    <a th:class="|statusInfoChange applyConfirmButotn|" 
                                    href="#" 
                                    th:data-url="@{/campaignPopup01/{campaignId}(campaignId=${campaign.campaignId})}" 
                                    onclick="openPopup(this.dataset.url); return false;">캠페인신청</a>
                                </td>
                            </tr>
                        </th:block>
                    </tbody>
                </table>
                <div class="parent">
                    <div class="child">
                        <a th:href="@{${pageUrl} + '&page=' + ${page.first}}">[처음]</a>
                        <th:block th:if="${page.page != page.first }">
                            <a th:href="@{${pageUrl} + '&page=' + ${page.prev}}">[이전]</a>
                        </th:block>
                        <th:block th:each="no : ${#numbers.sequence(page.start, page.end)}">
                            <th:block th:if="${page.page == no}">
                                <b><span th:text="${no}"></span></b>
                            </th:block>
                            <th:block th:if="${page.page != no}">
                                <a th:href="@{${pageUrl} + '&page='+${no}}" th:text="${no}"></a>
                            </th:block>
                        </th:block>
                        <th:block th:if="${page.page != page.last }">
                            <a th:href="@{${pageUrl} + '&page=' + ${page.next}}">[다음]</a>
                        </th:block>
                        <a th:href="@{${pageUrl} + '&page=' + ${page.last}}">[마지막]</a>
                    </div>
                </div>
                <a th:href="@{/campaign03}" class="insert">등록</a>
            </div>
        </div>
        <div id="modalPopup" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9999; align-items:center; justify-content:center;">
            <div style="background:#fff; padding:20px; border-radius:8px; width:400px; max-width:90%; position:relative;">
                <span onclick="closeModal();" style="position:absolute; top:10px; right:15px; cursor:pointer; font-size:20px; font-weight:bold;">&times;</span>
                <div id="modalContent"></div>
            </div>
        </div>
        <div th:replace="~{fragments/footer :: mainFooter}"></div>
        <div th:replace="~{fragments/sidebar :: adminScript}"></div>
    </body>
    <script th:inline="javascript">
        let campaign = /*[[${campaignsList}]]*/ null;

        // // 리스트 전체를 한 번에 콘솔에 출력
        // console.log(campaign);

        function openPopup(url) {
            // 1. 서버에 해당 url의 HTML 내용을 요청
            fetch(url)
            .then(response => {
                if (!response.ok) throw new Error('네트워크 응답 실패');
                return response.text(); // 페이지를 텍스트(HTML)로 읽어옴
            })
            .then(html => {
                // 2. 모달 컨텐츠 영역에 서버에서 가져온 HTML 주입
                document.getElementById('modalContent').innerHTML = html;
                // 3. 모달 display를 flex로 바꿔서 화면에 노출
                document.getElementById('modalPopup').style.display = 'flex';
            })
            .catch(error => {
                console.error('모달 로드 중 에러 발생:', error);
                alert('페이지를 불러오는 중 오류가 발생했습니다.');
            });
        }

        function closeModal() {
            // 모달 닫기 및 컨텐츠 초기화
            const modal = document.getElementById('modalPopup');
            if(modal) 
                modal.style.display = 'none';

            $('#modalContent').html(''); // 닫을 때 내부 내용 초기화 (중복 방지 핵심!)
            // document.getElementById('significantModal').style.display = 'none';
            // document.getElementById('modalContent').innerHTML = '';
        }

        function applyCampaign(campaignId, id) {
            const userChk = document.querySelectorAll('.user_Chk:checked');
            const csrfToken = document.querySelector('meta[name="_csrf"]')?.content;
            const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.content;

            const userNoList = Array.from(userChk).map(cb => cb.value);
            // 3. 🔥 [추가] 체크된 체크박스와 '같은 칸(td)'에 숨겨져 있는 userId 문자열 값 배열
            const userIdList = Array.from(userChk).map(cb => {
                // 체크박스(cb)의 부모 태그(td)를 찾은 후, 그 안에서 .user_Id 클래스를 가진 hidden 값을 가져옴
                return cb.closest('td').querySelector('.user_Id').value;
            });
            
            console.log("선택된 유저 일련번호(id) 리스트:", userIdList);      // 예: ["43", "34"]
            console.log("선택된 유저 아이디(userId) 리스트:", userIdList); // 예: ["admin123", "test01"]
            
            const url = "/admin/userApply";
            
            const sendData = {
                campaignId: campaignId,
                userNos: userNoList, // [1, 2, 3] 형태의 배열
                userIds: userIdList,
                eventPeriodStr: campaign[0].eventPeriodStr,
                eventPeriodEnd: campaign[0].eventPeriodEnd,
                timeSegment: campaign[0].timeSegment
            };
            // // 모달 닫기 및 컨텐츠 초기화
            // const modal = document.getElementById('modalPopup');
            // if(modal) 
            //     modal.style.display = 'none';

            // $('#modalContent').html(''); // 닫을 때 내부 내용 초기화 (중복 방지 핵심!)
            // document.getElementById('significantModal').style.display = 'none';
            // document.getElementById('modalContent').innerHTML = '';
            console.log("sendData 값 확인:", sendData);

            console.log("csrfHeader 값 확인:", csrfHeader);
            console.log("csrfToken 값 확인:", csrfToken);
            fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    [csrfHeader]: csrfToken
                },
                body: JSON.stringify(sendData)
            })
            .then(response => {
                // 성공(200 OK)인 경우
                if (response.ok) {
                    alert('신청이 완료되었습니다!');
                    // currentBtn.innerText = '신청완료';
                    // currentBtn.disabled = true;
                    // currentBtn.classList.add('completed');
                    // location.reload();
                    closeModal();
                    return; // 성공 시 여기서 종료
                }
                
                // 실패(400, 500 등)인 경우 서버가 보낸 JSON 에러 메시지 추출
                return response.json().then(errData => {
                    // 서버에서 ResponseEntity.badRequest().body("{\"message\": \"...\"}") 로 보낸 내용
                    throw new Error(errData.message || '신청 중 알 수 없는 오류가 발생했습니다.');
                });
            })
            .catch(error => {
                // 위에서 throw한 에러나 네트워크 에러를 여기서 처리
                console.error('Error:', error);
                alert(error.message); // "이미 해당 기간에 신청된 다른 일정이 있습니다." 등이 출력됨
            });
        }
    </script>
    
</html>

<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
                xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
                layout:decorate="~{layouts/base_layout}"><head>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>

    <title>Document</title>
    <link rel="stylesheet" href="/css/style.css" />
    <style>
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
    }
    
    
    label {
      width: 130px;
      font-weight: 600;
      color: #222;
    }

    .mypageInput{
      flex: 1;
      padding: 15px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 1rem;
    }
    input[readonly] {
      background-color: #f0f0f0;
      cursor: not-allowed;
    }
    .mypage_button {
      margin-left: 15px;
      padding: 10px 20px;
      font-size: 1.1rem;
      border: none;
      border-radius: 5px;
      background-color: #f09a67;
      color: white;
      cursor: pointer;
    }
        .mypage_button_width {
            width: 100%;
        margin-top: 0px;
        padding: 10px 20px;
        font-size: 1.1rem;
        border: none;
        border-radius: 5px;
        background-color: #f09a67;
        color: white;
        margin-right: 5px;
        /* cursor: pointer; */
        }

        .mypage_gray_button {
            width: 100%;
        margin-top: 0px;
        padding: 10px 20px;
        font-size: 1.1rem;
        border: none;
        border-radius: 5px;
        background-color: #aaa;
        color: white;
        margin-right: 5px;
        /* cursor: pointer; */
        }
    button:hover {
        background-color: #e28342;
    }
    .left-container {
    display: flex;
    flex-direction: column;  /* 세로 정렬 (이미지 위, 텍스트 아래) */
    align-items: center;     /* 가로 중심 정렬 */
    justify-content: center; /* 세로 중심 정렬 */
    height: 100%;            /* 부모 컨테이너 높이에 맞춤 (필요에 따라 조절) */
    width: 100%;             /* 부모 컨테이너 너비에 맞춤 */
    box-sizing: border-box;  /* 패딩, 보더 포함 */
    padding: 10px;           /* 영역 내 간격 */
    }
    .mypage_address {
        width: 64% ;
        margin: 15px 0;
    }
    .zone_code {
        margin-right: 15px;
        width: 100px;
    }
    @media (max-width: 768px) {
        .mypage_button {
            margin-left: 10px;
        }
        .mypage_address {
            width: 48.9%;
            margin: 15px 0;
        }
    }
    </style>
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>

    <script th:inline="javascript">
        // /*<![CDATA[*/
        // const isAuthenticated = /*[[${#authentication.principal != 'anonymousUser'}]]*/ false; // 서버에서 boolean 값 주입
        // if (isAuthenticated) {
        //     console.log("JavaScript: 사용자 로그인 상태입니다.");
        // } else {
        //     console.log("JavaScript: 사용자 로그인 상태가 아닙니다.");
        // }
        // /*]]>*/
        document.addEventListener('DOMContentLoaded', function () {

        });

        // const csrfToken = /*[[${_csrf.token}]]*/ '';
        // const csrfHeaderName = /*[[${_csrf.headerName}]]*/ '';

var element_wrap = document.getElementById('address_search_wrap');

function foldDaumPostcode() {
    document.getElementById('address_modal_background').style.display = 'none';
}

function execDaumPostcode() {
    var element_wrap = document.getElementById('address_search_wrap');
    var modal_bg = document.getElementById('address_modal_background');

    modal_bg.style.display = 'flex'; // 모달 보이기

    new daum.Postcode({
        oncomplete: function(data) {
            var addr = '';
            var extraAddr = '';
            console.log(data.sido);
            if (data.userSelectedType === 'R') {
                addr = data.roadAddress;
            } else {
                addr = data.jibunAddress;
            }

            if(data.userSelectedType === 'R'){
                if(data.bname !== '' && /[동|로|가]$/g.test(data.bname)){
                    extraAddr += data.bname;
                }
                if(data.buildingName !== '' && data.apartment === 'Y'){
                    extraAddr += (extraAddr !== '' ? ', ' + data.buildingName : data.buildingName);
                }
                if(extraAddr !== ''){
                    extraAddr = ' (' + extraAddr + ')';
                }
            }
            console.log(data)
            document.getElementById('zoneCode').value = data.zonecode;
            document.getElementById('address').value = addr + extraAddr;
            document.getElementById('province').value = data.sido;
            document.getElementById('city').value = data.sigungu;
            document.getElementById('roadName').value = data.roadname;
            document.getElementById('roadAddress').value = data.roadAddress;
            // document.getElementById('jibunAddress').value = data.jibunAddress;
            document.getElementById('extraAddress').value = data.bname;

            // document.getElementById('detailAddress').value = ''
            document.getElementById('detailAddress').focus();

            foldDaumPostcode(); // 모달 닫기

        },
        onresize : function(size) {
            element_wrap.style.height = 460 + 'px';
        },
        width : '100%',
        height : '100%'
    }).embed(element_wrap);
}

    // roadAddress detailAddress를 합쳐서 fullAddress를 업데이트하는 함수
    function updateFullAddress() {
        const jibunAddr = document.getElementById('roadAddress').value;      // 숨겨진 지번 주소 (Daum API 결과)
        const detailAddr = document.getElementById('detailAddress').value;    // 사용자가 직접 입력하는 상세 주소

        let combinedAddress = jibunAddr; // 기본은 지번 주소로 시작

        // 상세 주소 필드에 값이 있다면 지번 주소 뒤에 추가
        if (detailAddr.trim() !== '') { // trim()으로 공백 제거 후 내용이 있는지 확인
            combinedAddress += ' ' + detailAddr; // 공백을 넣어 구분
        }
        console.log(combinedAddress);
        // 최종적으로 조합된 주소를 fullAddress hidden 필드에 설정
        document.getElementById('fullAddress').value = combinedAddress.trim(); // 마지막 공백까지 제거
    }

    </script>
</head>
<body>
    <main layout:fragment="content">
        <div class="main-side-content">
            <div class="container">
                <th:block th:replace="~{fragments/mypageSidebar :: mypageSidebarMenuDesktop}" />
            </div>
            <div class="mypage_title">
                <span>마이페이지</span>
            </div>
            <div class="mypage_info_form">
                <div class="container  mrgb15">
                    <th:block th:replace="~{fragments/mypageSidebar :: mypageSidebarProfileMobile}">
                        <hr style="margin: 20px 0; border: 0.5px solid #eee;">
                    </th:block>
                </div>
                <form class="mypage_form" id="form" action="/mypage/updateInfo" method="post" enctype="multipart/form-data">

                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <input type="hidden" name="id" th:value="${user.id}" />
                    <input type="hidden" name="userId" th:value="${user.userId}" />
                    <div class="welcome_id">
                        <p>환영합니다, <span sec:authentication="name"></span>님! 마이페이지입니다.</p>
                    </div>
                    <!-- 로그인한 사용자만 이 섹션을 볼 수 있도록 함 -->
                    <div sec:authorize="isAuthenticated()">
                    <!-- #authentication.principal 을 user 변수에 할당하여 편리하게 사용 -->
                    <!-- <div th:with="user = ${#authentication.principal}"> -->
                        
                            
                    <div class="section-title">회원정보</div>
                    <div class="form-row">
                        <label for="email">이메일</label>
                        <input class="mypageInput" type="text" id="email" name="email" th:value="${user.email}" readonly />
                    </div>
                    <div class="form-row">
                        <label for="phoneNum">휴대전화번호</label>
                        <input class="mypageInput" type="text" id="phoneNum" name="phoneNum" th:value="${user.phoneNum}"/>
                    </div>
                    <div class="form-row">
                        <label for="bankNm">은행명</label>
                        <input class="mypageInput" type="text" id="bankNm" name="bankNm" th:value="${user.bankNm}" placeholder="은행명 입력" />
                    </div>
                    <div class="form-row">
                        <label for="accountNumber">계좌번호</label>
                        <input class="mypageInput" type="text" id="accountNumber" name="accountNumber" th:value="${user.accountNumber}" placeholder="계좌번호 입력" />
                    </div>
                    <div class="form-row">
                        <label for="depositor">예금주명</label>
                        <input class="mypageInput" type="text" id="depositor" name="depositor" th:value="${user.depositor}" placeholder="예금주명 입력" />
                    </div>
                    <div th:if="${getAddress != null}">
                        <div class="form-row">
                            <label for="address">주소</label>
                            <input class="mypageInput" type="text" id="getFullAddress" name="getFullAddress" th:value="${getAddress.fullAddress}" placeholder="" readonly/>
                        </div>
                    </div>
                    <div class="form-row">
                        <!-- <span sec:authentication="name"></span> -->
                        <input class="mypageInput zone_code" type="text" name="zoneCode"  id="zoneCode" placeholder="우편번호" readonly>
                        <input class="mypageInput" type="text" name="address" id="address" placeholder="주소" readonly autocomplete="street-address"><br>
                        <div class="w100">
                            <input class="mypageInput mypage_address" type="text" name="detailAddress"  id="detailAddress" placeholder="상세주소" oninput="updateFullAddress();">
                            <input class="mypage_button" type="button" onclick="execDaumPostcode()" value="우편번호 찾기"><br>
                        </div>
                        <input type="hidden" name="province" id="province">
                        <input type="hidden" name="city" id="city">
                        <input type="hidden" name="roadName" id="roadName">
                        <input type="hidden" name="roadAddress" id="roadAddress">
                        <input type="hidden" name="jibunAddress" d="jibunAddress">
                        <input type="hidden" name="extraAddress" id="extraAddress">
                        <input type="hidden" name="fullAddress" id="fullAddress" value="">
                    </div>
                    <div class="form-row">
                        <button class="mypage_button_width" type="submit">저장하기</button>
                    </div>
                </form>
            </div>
        </div>
    
        <div id="address_modal_background" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; 
        background-color: rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:9999;">
            <div id="address_search_wrap" style="position:relative; width:90%; max-width:500px; height:460px; background:#fff; border-radius:8px; padding:10px; box-sizing: border-box;">
                <button onclick="foldDaumPostcode()" style="position:absolute; top:10px; right:10px; z-index:10; cursor:pointer;">✕</button>
            </div>
        </div>
        <!-- 로그인하지 않은 사용자에게 보이는 메시지 -->
        <div sec:authorize="!isAuthenticated()" class="guest-message">
            <p>로그인 후 마이페이지를 이용하실 수 있습니다.</p>
            <p><a th:href="@{/login}">로그인하기</a></p>
        </div>
    </div>
    <!-- ✅ 드래그앤드롭 스크립트 -->
    <script th:inline="javascript">
        const infoForm = document.getElementById("form");
        infoForm.addEventListener('submit', function(e) {
            e.preventDefault();
            let getAddress = /*[[${getAddress}]]*/ null;
            const phoneNum = document.getElementById("phoneNum")?.value || "";
            const bankNm = document.getElementById("bankNm")?.value || "";
            const accountNumber = document.getElementById("accountNumber")?.value || "";
            const depositor = document.getElementById("depositor")?.value || "";
            const detailAddress = document.getElementById("detailAddress")?.value || "";
            const address = document.getElementById("address")?.value || "";
            const csrfTokenTag = document.querySelector('meta[name="_csrf"]');
            const csrfHeaderTag = document.querySelector('meta[name="_csrf_header"]');
            
            if (!csrfTokenTag || !csrfHeaderTag) {
                alert("보안 토큰을 찾을 수 없습니다.");
                return;
            }
            const csrfToken = csrfTokenTag.getAttribute('content');
            const csrfHeader = csrfHeaderTag.getAttribute('content'); // 에러 해결 지점
            // -
            if (getAddress == null) {
                if (!bankNm || !accountNumber || !depositor || !detailAddress || !address || !phoneNum) {
                    alert('개인 정보를 모두 입력하고 저장해주세요.');
                    return;
                }
            } else {
                if (!bankNm || !accountNumber || !depositor || !phoneNum) {
                    alert('은행 정보와 연락처를 모두 입력하고 저장해주세요.');
                    return;
                }
            }

            const formData = new FormData(infoForm);
            // for (let [key, value] of formData.entries()) {
            //     console.log(key + ': ' + value);
            // }
            formData.set('phoneNum', phoneNum);
            formData.set('bankNm', bankNm);
            formData.set('accountNumber', accountNumber);
            formData.set('depositor', depositor);
            formData.set('detailAddress', detailAddress);
            formData.set('address', address);

            fetch('/mypage/updateInfo', {
                method: 'POST',
                headers: { [csrfHeader]: csrfToken },
                body: formData
            })
            .then(res => {
                if (!res.ok) throw new Error('저장 실패');
                    return res.json();
            })
            .then(data => {
                console.log("data : " + JSON.stringify(data));
                if (!data.success) {
                    alert("이미 가입된 번호입니다.");
                return;
                } else {
                    alert("저장 되었습니다.");
                }
            })
            .catch(err => {
                console.error(err);
                alert("오류 발생: " + err.message);
            });
        });
    </script>
</main>
</body>
</html>

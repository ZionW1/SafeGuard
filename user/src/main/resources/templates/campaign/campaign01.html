<style>
    
    .container {
        display: black;
        gap: 40px;
        max-width: 90%;
        margin: 0 auto;
    }
    
    .left-view {
        flex: 2;
    }
    .right-view {
        flex: 1;
        max-width: 450px;
    }
    /* .campaignTitle{
        font-size: 40px;
        margin-bottom: 20px;
    } */
    /* 이미지 영역 */
    .image-row {
        display: flex;
        gap: 20px;
        margin: 20px 0px;
    }
    .image-row img {
        max-width: 100%; 
        height: 800px;
        height: -webkit-fill-available;
        border-radius: 16px;
        object-fit: cover;
    }

    /* 제공내역 */
    .section-title {
        font-weight: 700;
        font-size: 1.4rem;
        margin-bottom: 10px;
    }
    .highlight-pink {
        color: #e12e76;
        font-weight: 700;
    }
    .content-text {
        font-size: 0.9rem;
        line-height: 1.4;
        color: #666;
    }
    .content-text small {
        display: block;
        margin-top: 6px;
    }
    /* hr {
        margin: 30px 0;
        border-color: #eee;
    } */

    /* 방문안내 */
    .visit-info p {
        font-size: 0.85rem;
        line-height: 1.3;
        color: #666;
        margin: 8px 0;
    }
    .visit-info strong {
        color: #333;
    }
    .visit-info .bullet {
        margin-right: 5px;
    }

    /* 주소 */
    .address {
        margin-top: 20px;
        font-size: 1.5em;
        color: #333;
    }

    /* 신청기간 및 달력 */
    .right-view h2 {
        font-weight: 800;
        font-size: 1.25rem;
        margin-bottom: 14px;
    }
    .right-view h2 .highlight-pink {
        font-weight: 900;
    }
    .right-view .period-info {
        text-align: left;
        font-size: 0.9rem;

    }
    .period-info div {
        margin-bottom: 6px;
    }
    .period-info div span {
        margin-left: 8px;
        font-weight: 600;
    }
    .calendar-nav {
        text-align: center;
        margin-bottom: 14px;
    }
    .calendar-nav button {
        border: none;
        background: none;
        font-size: 1.2rem;
        cursor: pointer;
        color: #666;
        padding: 0 10px;
    }
    .calendar-month {
        font-weight: 700;
        font-size: 1rem;
    }

    table.calendar {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 20px;
    }
    table.calendar th,
    table.calendar td {
        width: 14.28%; /* 7일체크 */
        text-align: center;
        font-size: 0.9rem;
        padding: 6px 0;
        color: #999;
    }
    table.calendar th {
        color: #aaa;
        font-weight: 600;
    }
    table.calendar td.active,
    table.calendar td.today {
        color: #333;
        font-weight: 600;
    }
    table.calendar td.weekend {
        color: #d84f42;
        font-weight: 600;
    }
    table.calendar td.saturday {
        color: #2972ff;
        font-weight: 600;
    }
    table.calendar td.apply-day {
        background: #f5f1f5;
        border-radius: 12px;
        font-weight: 700;
    }

    .btn-apply {
        width: 100%;
        background-color: #111;
        color: white;
        border: none;
        font-weight: 700;
        font-size: 1rem;
        padding: 12px 0;
        border-radius: 16px;
        /* cursor: pointer; */
    }
    .calendar-day {
        position: relative;
        width: 40px;
        height: 40px;
        text-align: center;
        vertical-align: middle;
        cursor: pointer;
    }
    .application-period {
        background-color: #66666688; /* 반투명 회색 */
    }
    .announcement-day {
        background-color: #d5a8ee; /* 연보라색 */
        border-radius: 50%;
    }
    .experience-period {
        background-color: #d1d2db; /* 연회색 */
    }
    .fc-view-harness fc-view-harness-active{
        height: 450px;
    }
    #calendar {
        width: 100%;  /* 너비는 컨테이너에 맞게 조절 */
        max-width: 900px;  /* 필요에 따라 최대 너비 지정 */
        margin: 0 auto;  /* 가운데 정렬 */
    }

    .fc-prev-button,
    .fc-next-button {
        font-size: 1rem;
        padding: 0.4em 0.8em;
        height: 36px;
        line-height: 1.2;
        display: flex;
        align-items: center;
        justify-content: center;
        vertical-align: middle;
        margin: 0 4px;
        box-sizing: border-box;
    }


    .fc-icon-chevron-left::before,
    .fc-icon-chevron-right::before {
        font-size: 1.2rem;
    }

                const csrfTokenTag = document.querySelector('meta[name="_csrf"]');
                const csrfHeaderTag = document.querySelector('meta[name="_csrf_header"]');
                
                if (!csrfTokenTag || !csrfHeaderTag) {
                    alert("보안 토큰을 찾을 수 없습니다.");
                    return;
                }
                const csrfToken = csrfTokenTag.getAttribute('content');
                const csrfHeader = csrfHeaderTag.getAttribute('content'); // 에러 해결 지점
                const applyData = {
                    userNo: currentBtn.dataset.userNo,
                    userId: currentBtn.dataset.userId,
                    campaignId: currentBtn.dataset.campaignId,
                    eventPeriodStr: currentBtn.dataset.periodStr,
                    eventPeriodEnd: currentBtn.dataset.periodEnd,
                    guardType: currentBtn.dataset.guardType,
                    applicantsNum: currentBtn.dataset.applicantsNum
                };

                    // 1. 체크할 항목들을 '변수명: 표시이름' 형태로 정의합니다.
                    const requiredFields = {
                        bankNm: "은행명",
                        accountNumber: "계좌번호",
                        depositor: "예금주",
                        fullAddress: "주소",
                        savedName: "프로필 이미지",
                        email: "이메일",
                        phoneHash: "전화번호"
                    };

                    // 2. 반복문을 돌면서 비어있는 항목을 찾습니다.
                    for (const [key, label] of Object.entries(requiredFields)) {
                        if (!user[key]) { // 값이 null, undefined, "" 인 경우
                            alert(label + " 정보가 없습니다.\n'내정보'에서 입력 후 저장해 주세요.");
                            
                            // 필요하다면 해당 입력창으로 포커스를 보낼 수도 있습니다.
                            // document.getElementById(key).focus(); 
                            
                            return; // 하나라도 없으면 여기서 중단
                        }
                    }

                    // 3. 모든 관문을 통과하면 실행
                    console.log("모든 정보가 확인되었습니다!");
                }
                if(campaign.typeCode == "01"){
                    if(currentBtn.dataset.guardType == "00" || currentBtn.dataset.guardType == "01"){
                        alert('신청 권한이 없습니다. "경호원 신청" 후 캠페인 신청 해주세요.');
                        return;
                    }
                }
                
                fetch('/apply', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        [csrfHeader]: csrfToken
                    },
                    body: JSON.stringify(applyData)
                })
                .then(response => {
                    // 성공(200 OK)인 경우
                    if (response.ok) {
                        alert('신청이 완료되었습니다!');
                        currentBtn.innerText = '신청완료';
                        currentBtn.disabled = true;
                        currentBtn.classList.add('completed');
                        return; // 성공 시 여기서 종료
                    }
                    
                    // 실패(400, 500 등)인 경우 서버가 보낸 JSON 에러 메시지 추출
                    return response.json().then(errData => {
                        // 서버에서 ResponseEntity.badRequest().body("{\"message\": \"...\"}") 로 보낸 내용
                        throw new Error(errData.message || '신청 중 알 수 없는 오류가 발생했습니다.');
                    });
                })
                .catch(error => {
                    // 위에서 throw한 에러나 네트워크 에러를 여기서 처리
                    console.error('Error:', error);
                    alert(error.message); // "이미 해당 기간에 신청된 다른 일정이 있습니다." 등이 출력됨
                });
            });
        });
    });

    <script th:inline="javascript">
        document.addEventListener('DOMContentLoaded', () => {
            let campaign = /*[[${campaignSelect}]]*/ null;

            // 로그인 페이지로 이동하는 함수
            const tabs = document.querySelectorAll('.tab');
            const tabContents = document.querySelectorAll('.tab-content');

            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    console.log("탭 클릭됨: " + tab.id);
                    // 모든 탭 비활성화
                    tabs.forEach(t => {
                        t.classList.remove('active');
                        t.setAttribute('aria-selected', 'false');
                        t.setAttribute('tabindex', '-1');
                    });
                    tabContents.forEach(tc => tc.classList.remove('active'));

                    // 클릭한 탭 활성화
                    tab.classList.add('active');
                    tab.setAttribute('aria-selected', 'true');
                    tab.setAttribute('tabindex', '0');

                    const target = tab.getAttribute('aria-controls');
                    // const tabContent = document.getElementById('tab-'+target);
                    // console.log('타겟 id:', target, '선택된 요소:', tabContent);
                    // if (tabContent) {
                    //     tabContent.classList.add('active');
                    // } else {
                    //     console.warn('해당 id를 가진 요소가 없습니다:', target);
                    // }
                    
                    document.getElementById(target+'-tab').classList.add('active');
                    var calendarEl = document.getElementById('calendarMobile');
                    var calendar_month = campaign.eventPeriodStr;

                    var calendar = new FullCalendar.Calendar(calendarEl, {
                    // initialDate: '2026-04-01', // 초기 날짜 설정 (예: 2026년 4월 1일)
                    initialView: 'dayGridMonth',
                    initialDate: calendar_month,   // ← 원하는 날짜
                    locale: 'ko',
                    height: 400,
                    headerToolbar: {
                        right: 'prev,next today'
                    },
                    events: function(fetchInfo, successCallback, failureCallback) {
                        fetch("/campaign07?id=" + campaign.campaignId)
                        .then(res => res.json())
                        .then(data => {
                            let events = [];
                            if (data.appPeriodStr && data.appPeriodEnd) {
                            let endDate = new Date(data.appPeriodEnd);
                            endDate.setDate(endDate.getDate() + 1);
                            let formattedEnd = endDate.toISOString().slice(0, 10);
                            events.push({
                                title: '신청 기간',
                                start: data.appPeriodStr,
                                end: formattedEnd,
                                color: '#4285F4',
                            });
                            }
                            if (data.eventPeriodStr && data.eventPeriodEnd) {
                            let endDate2 = new Date(data.eventPeriodEnd);
                            endDate2.setDate(endDate2.getDate() + 1);
                            let formattedEnd2 = endDate2.toISOString().slice(0, 10);
                            events.push({
                                title: '이벤트 진행',
                                start: data.eventPeriodStr,
                                end: formattedEnd2,
                                color: '#DB4437',
                            });
                            }
                            successCallback(events);
                        })
                        .catch(error => failureCallback(error));
                    }
                    });
                    calendar.render();
                });
            });

            // 키보드 접근성 처리 (좌우 화살표로 탭 이동)
            document.querySelector('.tabs').addEventListener('keydown', (e) => {
                const activeIndex = Array.from(tabs).findIndex(t => t.classList.contains('active'));
                if (e.key === 'ArrowRight') {
                    const nextIndex = (activeIndex + 1) % tabs.length;
                    tabs[nextIndex].focus();
                } else if (e.key === 'ArrowLeft') {
                    const prevIndex = (activeIndex - 1 + tabs.length) % tabs.length;
                    tabs[prevIndex].focus();
                }
            });
        });
    </script>

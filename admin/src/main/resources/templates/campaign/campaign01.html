<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <title>캠페인 목록 요약</title>
        <link rel="stylesheet" th:href="@{/css/style.css}">
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <th:block th:replace="~{fragments/csrfFragments :: metaCsrf}"></th:block>
    </head>
    <body>
        <div class="admin-container">
            <div th:if="${user.userId} == 'semiAdmin'">
                <div th:replace="~{fragments/sidebar :: sidebarFragment-semi}"></div>
            </div>
            <div th:unless="${user.userId} == 'semiAdmin'">
                <div th:replace="~{fragments/sidebar :: sidebarFragment}"></div>
            </div>
            <div class="main-content">
                
                <h1><a th:href="@{/campaign01}">캠페인 목록 요약</a></h1>
                <form class="optionForm" th:action="@{/campaign01}" method="get" id="form">
                    <div th:replace="~{fragments/csrfFragments :: inputCsrf}"></div>
                    <select name="code" class="wdt160">
                        <option value="0" th:selected="${option.code==0}">전체</option>
                        <option value="1" th:selected="${option.code==1}">제목</option>
                        <option value="2" th:selected="${option.code==2}">주소</option>
                        <option value="3" th:selected="${option.code==3}">리더자</option>
                    </select>
                    <select name="orderCode" id="order-code" class="wdt160">
                        <option value="0" th:selected="${option.orderCode == 0}">최신순</option>
                        <option value="1" th:selected="${option.orderCode == 1}">제목순</option>
                    </select>
                    <input type="text" name="keyword" placeholder="검색어를 입력해 주세요." th:value="${param.keyword}" style="width: 160px;">
                    <input class="optionSubmit" type="submit" value="검색">
                </form>
                <table class="campaign_Table" border="1">
                    <colgroup>
                        <col width="5%"></col>
                        <col width="*"></col>
                        <col width="20%"></col>
                        <col width="10%"></col>
                        <col width="12%"></col>
                        <col width="10%"></col>
                        <col width="10%"></col>
                        <col width="10%"></col>
                        <col width="10%"></col>
                    </colgroup>
                    <thead>
                        <th>ID</th>
                        <th>지역</th>
                        <th>캠페인명</th>
                        <th>인솔자</th>
                        <th>생성일</th>
                        <th>신청자수</th>
                        <th>모집인원</th>
                        <th>명단보기</th>
                        <th>상세보기</th>
                    </thead>
                    <tbody>
                        <th:block th:if="${campaignsList.isEmpty()}">
                            <tr>
                                <td colspan="9" align="center">조회된 데이터가 없습니다.</td>
                            </tr>
                        </th:block>
                    </div>
                        <th:block th:each="campaign : ${campaignsList}">
                            <tr>
                                <td><span th:text="${campaign.campaignId}"></span></td>
                                <td><span th:text="${campaign.placeAddr}"></span></td>
                                <td th:text="|${campaign.campaignTitle} (${campaign.timeSegment == 'DAY' || campaign.timeSegment == null ? '주간' : '야간'})|"></td>                                <td><span th:text="${campaign.userNm}"></span></td>
                                <td><span th:text="${campaign.eventPeriodStr != null ? #temporals.format(campaign.eventPeriodStr, 'yyyy.MM.dd') : ''}"></span>~<span th:text="${campaign.eventPeriodStr != null ? #temporals.format(campaign.eventPeriodEnd, 'yyyy.MM.dd') : ''}"></span></span></td>
                                <td><span th:text="${campaign.applicantsNum}"></span></td>
                                <td><span th:text="${campaign.recruitmentNum}"></span></td>
                                <td class="pointer">
                                    <a th:href="|/apply/applyConfirm/${campaign.campaignId}|" target="_blank">명단보기</a>
                                </td>
                                <td class="pointer">
                                    <a th:href="@{/campaign02(id=${campaign.campaignId})}" target="_blank">상세보기</a>
                                </td>
                            </tr>
                        </th:block>
                    </tbody>
                </table>
                <div class="parent">
                    <div class="child">
                        <a th:href="@{${pageUrl} + '&page=' + ${page.first}}">[처음]</a>
                        <th:block th:if="${page.page != page.first }">
                            <a th:href="@{${pageUrl} + '&page=' + ${page.prev}}">[이전]</a>
                        </th:block>
                        <th:block th:each="no : ${#numbers.sequence(page.start, page.end)}">
                            <th:block th:if="${page.page == no}">
                                <b><span th:text="${no}"></span></b>
                            </th:block>
                            <th:block th:if="${page.page != no}">
                                <a th:href="@{${pageUrl} + '&page='+${no}}" th:text="${no}"></a>
                            </th:block>
                        </th:block>
                        <th:block th:if="${page.page != page.last }">
                            <a th:href="@{${pageUrl} + '&page=' + ${page.next}}">[다음]</a>
                        </th:block>
                        <a th:href="@{${pageUrl} + '&page=' + ${page.last}}">[마지막]</a>
                    </div>
                </div>
                <a th:href="@{/campaign03}" class="insert">등록</a>
            </div>
        </div>
        <div th:replace="~{fragments/footer :: mainFooter}"></div>
        <div th:replace="~{fragments/sidebar :: adminScript}"></div>
    </body>
</html>

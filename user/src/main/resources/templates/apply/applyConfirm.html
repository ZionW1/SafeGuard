<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>행집 명단 확인</title>
    <link rel="stylesheet" href="/mobile/css/style.css" />
</head>
<body class="bodyApplyConfirm">
    <div th:if="${not #lists.isEmpty(userCampaignApply)}">
        <div id="campaignArea" th:data-campaign-id="${userCampaignApply[0].campaignId}">
            <div id="campaignIdDown" th:data-campaign-id="${userCampaignApply[0].campaignId}">
                <div id="campaignTitleDown" th:data-campaign-title="${userCampaignApply[0].campaignTitle}">
                    <div class="notice-box">
                        <h2 th:if="${userCampaignApply != null}" th:text="${userCampaignApply[0].campaignTitle}"></h2>

                        <strong>업체명 : </strong><strong th:text="${userCampaignApply[0].companyNm}"></strong><br><strong> 담당자 번호 : </strong><strong th:text="${userCampaignApply[0].companyPh}"></strong></p>
                        <p> 
                            <strong>기간</strong><br />
                            <strong th:text="${userCampaignApply[0].eventPeriodStr}"></strong> ~ <strong th:text="${userCampaignApply[0].eventPeriodEnd}"></strong> 
                        </p>
                        <p>
                            <strong>근무 형태 : </strong><strong th:text="${userCampaignApply[0].timeSegment == 'DAY' ? '주간' : '야간'}"></strong>

    </div>
    <div th:if="${#lists.isEmpty(userCampaignApply)}" class="section">
        <p>해당 날짜에는 신청자가 없습니다.</p>
    </div>
    <div class="section">

        <select class="date_Select" id="dateSelector" th:onchange="location.href='/apply/applyConfirm/' + [[${campaignId}]] + '?date=' + this.value">
            <option value="">날짜를 선택하세요</option>
            <option th:each="item : ${applyDate}" 
                    th:value="${item.applyDate}" 
                    th:text="${item.applyDate}"
                    th:selected="${item.applyDate == currentDate}"> </option>
        </select>
        <div th:if="${reviewId == null}">
            <!-- <a class="review_btn" th:href="@{/review03/{id}(id=${campaignId})}">리뷰 등록</a> -->
            <a th:if="${#authorization.expression('isAuthenticated()')}" 
            class="review_btn" 
            th:href="@{/review03/{id}(id=${campaignId})}">리뷰 등록</a>

            <a th:if="${!#authorization.expression('isAuthenticated()')}" 
            class="review_btn" 
            th:href="@{/user01(target='/review03/' + ${campaignId})}">리뷰 등록</a>
            <!-- <a th:href="@{/user01(target=${#request.requestURI})}">로그인하기</a> -->

            
        </div>
        <div class="pd-b20">
            <button type="button" class="btn-info" onclick="processAttendance('1')" style="background-color: #4CAF50; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold;">체크 출근</button>
            <button type="button" class="btn-info" onclick="processAttendance('2')" style="background-color: #f44336; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold;">체크 퇴근</button>
        </div>
    </div>

    <div class="section applicant-list-area">
        <div class="list-header">
            <span>신청자 수 :  <span th:text="${applicantsNum}"></span></span>
        </div>
        <p>현재 사용자 ID: <span th:text="${userId}">guest</span></p>
        <div class="applicant-item3">
            <div class="applicant-info">
                <label>
                    <input type="checkbox" class="chkAll" id="checkAll" name="checkAll" onclick="toggleAll(this)"><span class="checkAllfont">전체선택</span>
                </label>
                <div class="width100 mrg-b5 applicant-item" th:each="userCampaign, stat: ${userCampaignApply}" th:data-applicant-user-no="${userCampaign.userNo}"
                th:data-choose-status="${userCampaign.status}"> <!-- ⭐ userCampaign의 현재 status 값을 데이터 속성으로 추가 ⭐ -->
                    <div class="applyInfo" th:with="index=${stat.index}, currentUserNo=${userCampaign.userNo}, campaignId=${userCampaign.campaignId}, applyDate=${userCampaign.applyDate}">
                        <div th:if="${userCampaign.status=='8' || userCampaign.status=='9'}">
                        </div>
                        <div class="width100" th:unless="${userCampaign.status=='8' || userCampaign.status=='9'}">
                            
                            <div th:if="${userCampaign == null or userCampaign.filePath == null}">
                                <input type="checkbox" class="chkSelect" name="Attendance">
                                <img id="imgFile" src="/images/not-image.png" alt="파일이미지" width="50" height="50" />
                            </div>
                            <div class="" th:unless="${userCampaign.filePath == null}">
                                <input type="checkbox" class="chkSelect" name="Attendance">
                                <img id="imgFile" th:src="|/selectProfile?id=${userCampaign.userNo}&args=profile|" alt="파일이미지" width="50" height="50" />
                            </div>
                            <div style="margin-left: 95px; margin-top: -60px;">
                                <span class="userInfofont" th:text="${userCampaign.userNm}"></span>/
                                <!-- <span class="userInfofont" th:text="${userCampaign.phoneNum}"></span> -->
                                <span th:text="${userCampaign.hyphenPhone}">010-0000-0000</span>
                                <button th:onclick="rosterRemove([[${index}]], [[${currentUserNo}]], [[${campaignId}]], [[${applyDate}]])" th:class="|btn-state mrg5 button_status${stat.index}|">명단 삭제</button>
                            </div>
                            <div class="btn-area-confirmA">
                                <a th:class="|statusInfoChange applyConfirmButotn button_status${stat.index}|" href="#" data-status="1" th:onclick="updateAttendanceStatus(this.dataset.status, [[${currentUserNo}]], [[${campaignId}]], [[${applyDate}]], [[${index}]])">출근</a>
                                <a th:class="|statusInfoChange applyConfirmButotn button_status${stat.index}|" href="#" data-status="2" th:onclick="updateAttendanceStatus(this.dataset.status, [[${currentUserNo}]], [[${campaignId}]], [[${applyDate}]], [[${index}]])">퇴근</a>
                                <!-- <a th:class="|statusInfoChange applyConfirmButotn button_status${stat.index}|" href="#" data-status="3" th:onclick="updateAttendanceStatus(this.dataset.status, [[${currentUserNo}]], [[${campaignId}]], [[${applyDate}]], [[${index}]])">지각</a>
                                <a th:class="|statusInfoChange applyConfirmButotn button_status${stat.index}|" href="#" data-status="4" th:onclick="updateAttendanceStatus(this.dataset.status, [[${currentUserNo}]], [[${campaignId}]], [[${applyDate}]], [[${index}]])">결근</a>
                                <a th:class="|statusInfoChange applyConfirmButotn button_status${stat.index}|" href="#" data-status="5" th:onclick="updateAttendanceStatus(this.dataset.status, [[${currentUserNo}]], [[${campaignId}]], [[${applyDate}]], [[${index}]])">무단</a> -->
                                <!-- <a th:class="|statusInfoChange statusInfoChangeConfirm button_status${stat.index}|" th:href="@{/apply/significant/{userNo}/{campaignId}/{applyDate}(userNo=${currentUserNo}, campaignId=${campaignId}, applyDate=${applyDate})}" data-status="">특이사항</a> -->
                                <a th:class="|statusInfoChange applyConfirmButotn button_status${stat.index}|" 
                                    href="#" 
                                    th:data-url="@{/apply/significant/{userNo}/{campaignId}/{applyDate}(userNo=${currentUserNo}, campaignId=${campaignId}, applyDate=${applyDate})}" 
                                    onclick="openSignificantModal(this.dataset.url); return false;">특이사항</a>

                                <div id="significantModal" onclick="closeModal(event)" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9999; align-items:center; justify-content:center;">
                                    <div style="background:#fff; padding:20px; border-radius:8px; width:400px; max-width:90%; position:relative;">
                                        <span onclick="closeSignificantModal();" style="position:absolute; top:10px; right:15px; cursor:pointer; font-size:20px; font-weight:bold;">&times;</span>

                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    <div id="fileDownloadListSection" style="margin-top: 30px; padding: 15px; border-top: 1px solid #eee; display: none;">
        <h4><i class="fa fa-download" aria-hidden="true"></i> 다운로드 가능한 파일 목록</h4>
        <ul id="downloadLinksContainer" style="list-style: none; padding: 0;">
            <!-- JavaScript로 다운로드 링크들이 여기에 추가될 예정 -->
        </ul>
        <p id="noFilesMessage" style="color: #999; display: none;">다운로드할 파일이 없습니다.</p>
    </div>
    <div class="btn-area">
        <a class="btn-info" onclick="imgDownload('1')">신분증 사진<br>다운로드</a>
        <a class="btn-info" onclick="imgDownload('2')">이수증 사진<br>다운로드</a>
        <th:block th:if="${userCampaignApply != null and not #lists.isEmpty(userCampaignApply) and userCampaignApply[0].campaignId != null}">
            <a class="btn-info" type="button" 
                    th:onclick="downloadExcel([[${userCampaignApply[0].campaignId}]], [[${userCampaignApply[0].applyDate}]])">
                엑셀<br>다운로드
            </a>
        </th:block>
        <th:block th:unless="${userCampaignApply != null and not #lists.isEmpty(userCampaignApply) and userCampaignApply[0].campaignId != null}">
            <p>엑셀 다운로드 불가 (캠페인 정보 없음)</p>
        </th:block>
    </div>
    <div th:if="${leaderPay != 0}" class="btn-area">
        <a class="btn_leader" th:if="${leaderUserNo}" th:data-user-no="${leaderUserNo}" th:data-status="${leaderStatus}" th:data-campaign-id="${leaderCampaignId}" th:data-apply-date="${leaderApplyDate}" th:onclick="leaveWork(this)">인솔자 퇴근</a>
        <a th:class="|btn_leader|" th:href="@{/apply/significant/{userNo}/{campaignId}/{applyDate}(userNo=${leaderUserNo}, campaignId=${campaignId}, applyDate=${leaderApplyDate})}" data-status="">인솔자 특이사항</a>
    </div>

    <script th:inline="javascript">
        const csrfToken = /*[[${_csrf.token}]]*/ '';
        const csrfHeader = /*[[${_csrf.headerName}]]*/ '';
        const userCampaignApply = /*[[${userCampaignApply}]]*/ null;

        document.addEventListener('DOMContentLoaded', function() {
            var statusButtons ;
            const applicantItems = document.querySelectorAll('.applicant-item');
            for(var i = 0; i < userCampaignApply.length; i++) {
                applicantItems.forEach(item => {
                    const chooseStatus = item.dataset.chooseStatus;
                    statusButtons = item.querySelectorAll('.button_status'+i);
                    statusButtons.forEach(button => {
                        const targetStatus = button.dataset.status;
                        if (chooseStatus === targetStatus) {
                            button.classList.add('choice_status');
                        } else {
                            button.classList.remove('choice_status');
                        }
                    });
                });
            }
            

        });

        function openSignificantModal(url) {
            // 1. 서버에 해당 url의 HTML 내용을 요청
            fetch(url)
                .then(response => {
                    if (!response.ok) throw new Error('네트워크 응답 실패');
                    return response.text(); // 페이지를 텍스트(HTML)로 읽어옴
                })
                .then(html => {
                    // 2. 모달 컨텐츠 영역에 서버에서 가져온 HTML 주입
                    document.getElementById('modalContent').innerHTML = html;
                    // 3. 모달 display를 flex로 바꿔서 화면에 노출
                    document.getElementById('significantModal').style.display = 'flex';
                })
                .catch(error => {
                    console.error('모달 로드 중 에러 발생:', error);
                    alert('페이지를 불러오는 중 오류가 발생했습니다.');
                });
        }

        function closeSignificantModal() {
            // 모달 닫기 및 컨텐츠 초기화
            document.getElementById('significantModal').style.display = 'none';
            document.getElementById('modalContent').innerHTML = '';
        }

        function closeModal(event) {
            // 이벤트가 발생한 지점(event.target)이 'significantModal'(어두운 배경)일 때만 닫기 실행
            if (event.target === document.getElementById('significantModal')) {
                closeSignificantModal();
            }
        }

        async function imgDownload(code) {
            if (window.event) {
                window.event.preventDefault();
            }
            const campaignArea = document.getElementById('campaignArea');
            const campaignIdDown = document.getElementById('campaignIdDown');
            const campaignTitleDown = document.getElementById('campaignTitleDown');
            const campaignIdToDownload = Number(campaignArea.dataset.campaignId);
            const campaignId = Number(campaignIdDown.dataset.campaignId);
            const campaignTitle = String(campaignTitleDown.dataset.campaignTitle);
            
            if (!campaignArea) {
                alert('다운로드할 캠페인 정보를 찾을 수 없습니다.');
                return;
            }

            if (isNaN(campaignIdToDownload) || campaignIdToDownload <= 0) {
                alert('유효한 캠페인 ID를 찾을 수 없습니다.');
                return;
            }

            try {
                const requestData = {
                    campaignId: campaignId,
                    campaignTitle: campaignTitle,
                    code: code
                };
                const response = await fetch('/file/imgDownload', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        [csrfHeader]: csrfToken
                    },
                    body: JSON.stringify(requestData)
                });

                if (!response.ok) {
                    if (response.status === 400) { alert('잘못된 요청입니다. 캠페인 ID가 전달되지 않았습니다.'); }
                    else if (response.status === 404) { alert('요청된 캠페인 또는 파일을 찾을 수 없습니다.'); }
                    else if (response.status === 500) { alert('서버 오류로 ZIP 파일 생성에 실패했습니다.'); }
                    else { alert(`파일 다운로드 요청 중 오류 발생: ${response.status}`); }
                    console.error('ZIP 다운로드 실패:', response.status, await response.text());
                    return;
                }

                const blob = await response.blob();
                const contentDisposition = response.headers.get('Content-Disposition');
                let filename = `campaign_${campaignIdToDownload}_files.zip`;

                if (contentDisposition && contentDisposition.indexOf('filename=') !== -1) {
                    filename = contentDisposition.split('filename=')[1].split(';')[0].replace(/"/g, '');
                    try { filename = decodeURIComponent(filename); } catch (e) { console.warn('filename 디코딩 실패:', e); }
                }
                
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);

                alert('캠페인 파일들이 ZIP 형태로 다운로드됩니다.');

            } catch (error) {
                console.error('캠페인 ZIP 파일 다운로드 요청 중 오류 발생:', error);
                alert('캠페인 ZIP 파일 다운로드에 실패했습니다. 다시 시도해 주세요.');
            }
        }
        function downloadExcel(campaignId, applyDate) {
            if (window.event) {
                window.event.preventDefault();
            }
            if (!campaignId) {
                console.error("캠페인 ID가 유효하지 않습니다.");
                alert("다운로드할 캠페인 ID가 올바르지 않습니다.");
                return;
            }
            const downloadUrl = `/file/excelDownload/${campaignId}/${applyDate}`;
            
            window.location.href = downloadUrl;
        }
        
        function updateAttendanceStatus(status, userNo, campaignId, applyDate, index) {
            if (window.event) {
                window.event.preventDefault();
            }
            const clickedButtonIndex = document.querySelector(`.button_status` + index);
    
            if (clickedButtonIndex) {
                if (clickedButtonIndex.getAttribute('data-clicked') === 'true') {
                    console.log("이미 처리 중인 요청입니다. 연타 금지!");
                    return; 
                }
                
                // 1. [클릭 직후] 잠금 표식을 남기고, '처리 중'을 뜻하는 클래스를 일시적으로 부여합니다.
                clickedButtonIndex.setAttribute('data-clicked', 'true');
                clickedButtonIndex.classList.add('status-processing'); // 🟡 처리 중 색상용 클래스 추가
                clickedButtonIndex.style.pointerEvents = 'none';
            }
            
            const clickedButton = event.target;
            const applicantItems = document.querySelectorAll('.applicant-item');
            const requestBody = {
                userNo: userNo,
                campaignId: campaignId,
                applyDate: applyDate,
                status: status
            };
            applicantItems.forEach(item => {
                const chooseStatus = item.dataset.chooseStatus;
                const statusButtons = item.querySelectorAll('.button_status'+index);

                statusButtons.forEach(button => {
                    const targetStatus = button.dataset.status;

                    // if (chooseStatus === targetStatus) {
                    //     button.classList.remove('choice_status');

                    // } 
                });
            });
            if (!userNo || !campaignId || !applyDate) {
                console.error("상태 또는 사용자 정보가 올바르지 않습니다.", {status: status, userNo: userNo});
                alert("상태 변경에 필요한 정보가 부족합니다. 다시 시도해 주세요.");
                return;
            }
            const url = `/apply/attendance/updateStatus`; 

            fetch(url, {
                method: 'PATCH',
                headers: {
                    'Content-Type': 'application/json',
                    [csrfHeader]: csrfToken
                },
                body: JSON.stringify(requestBody)
            })
            .then(response => {
                if (!response.ok) { 
                    return response.json().then(errorData => {
                        throw new Error(errorData.message || '상태 변경 중 알 수 없는 오류가 발생했습니다.');
                    });
                }
                return response.json();
            })
            .then(data => {
                if(status == "0"){
                    if("${status}" == 2){
                        alert("출근 or 지각 터치 후 퇴근 버튼 터치 하세요.");
                        return ;
                    }
                } else{
                    if(status == "1" || status == "3"){
                        if("${status}" == 2){
                            alert("출결 확인");
                            return ;
                        }
                    }
                }
                alert(data.message);

                const buttons = document.querySelectorAll(`a[th-onclick$=", [[${userNo}]])"]`);
                console.log(buttons.forEach(btn => console.log(btn)));
                buttons.forEach(btn => btn.classList.remove('active-status'));
                clickedButton.classList.add('active-status');
            })
            .catch(error => {
                console.error('상태 변경 중 오류 발생:', error);
                alert('상태 변경에 실패했습니다: ' + error.message);
            })
            .finally(() => {
                // 3. [통신 종료] 성공하든 실패하든 3초 뒤에 연타 잠금과 '처리 중' 디자인을 걷어냅니다.
                // (성공했다면 2번에서 넣은 'active-status' 색상만 남게 됩니다.)
                setTimeout(function() {
                    if (clickedButtonIndex) {
                        clickedButtonIndex.removeAttribute('data-clicked');
                        clickedButtonIndex.classList.remove('status-processing'); // 🟡 처리 중 클래스 제거
                        clickedButtonIndex.style.pointerEvents = 'auto';
                    }
                }, 3000);
            });
        }

        function leaveWork(buttonElement) {
            if (window.event) {
                window.event.preventDefault();
            }

            const btnLeader = document.querySelector(`.btn_leader`);
            
            if (btnLeader) {
                if (btnLeader.getAttribute('data-clicked') === 'true') {
                    console.log("이미 처리 중인 요청입니다. 연타 금지!");
                    return; 
                }
                
                // 1. [클릭 직후] 잠금 표식을 남기고, '처리 중'을 뜻하는 클래스를 일시적으로 부여합니다.
                btnLeader.setAttribute('data-clicked', 'true');
                btnLeader.classList.add('status-processing'); // 🟡 처리 중 색상용 클래스 추가
                btnLeader.style.pointerEvents = 'none';
            }
            const clickedButton = event.target; // ⭐ 1. 클릭된 버튼을 먼저 변수에 저장! ⭐
            const applicantItems = document.querySelectorAll('.applicant-item');
            const userNo = buttonElement.dataset.userNo; // ⭐ data-user-no 속성 값 읽기 ⭐
            const status = buttonElement.dataset.status; // ⭐ data-status 속성 값 읽기 ⭐
            const applyDate = buttonElement.dataset.applyDate; // ⭐ data-status 속성 값 읽기 ⭐
            const campaignId = buttonElement.dataset.campaignId; // ⭐ data-status 속성 값 읽기 ⭐

            const requestBody = {
                userNo: userNo,
                campaignId: campaignId,
                applyDate: applyDate,
                status: "9"
            };

            if (!status && !userNo) {
                console.error("상태 또는 사용자 정보가 올바르지 않습니다.", {status: status, userNo: userNo});
                alert("상태 변경에 필요한 정보가 부족합니다. 다시 시도해 주세요.");
                return;
            }

            const url = `/apply/attendance/updateStatus`; 

            fetch(url, {
                method: 'PATCH',
                headers: {
                    'Content-Type': 'application/json',
                    [csrfHeader]: csrfToken
                },
                body: JSON.stringify(requestBody)
            })
            .then(response => {
                if (!response.ok) { 
                    return response.json().then(errorData => {
                        throw new Error(errorData.message || '상태 변경 중 알 수 없는 오류가 발생했습니다.');
                    });
                }
                return response.json();
            })
            .then(data => {
                if(status == "0"){
                    if("${status}" == 2){
                        alert("출근 or 지각 터치 후 퇴근 버튼 터치 하세요.");
                        return ;
                    }
                } else{
                    if(status == "1" || status == "3"){

        function toggleAll(masterCheckbox) {
            // class가 chkSelect인 모든 체크박스를 가져옴
            const checkboxes = document.querySelectorAll('.chkSelect');
            checkboxes.forEach(cb => {
                cb.checked = masterCheckbox.checked;
            });
        }

        function processAttendance(statusValue) {
            // 체크박스 중 선택된 것들만 수집
            const checkedBoxes = document.querySelectorAll('.chkSelect:checked');
            
            if (checkedBoxes.length === 0) {
                alert('선택된 사용자가 없습니다.');
                return;
            }
            
            const statusText = statusValue === '1' ? '출근' : '퇴근';
            if (!confirm(`선택한 ${checkedBoxes.length}명을 일괄 [${statusText}] 처리하시겠습니까?`)) {
                return;
            }

            // 기존 개별 클릭 시 작동하던 타임리프 바인딩 데이터를 엘리먼트에서 동적으로 읽어옴
            let successCount = 0;
            
            // 비동기 처리가 순차적으로 다 끝난 후 새로고침하기 위해 Promise 배열 생성
            const promises = Array.from(checkedBoxes).map(cb => {
                // 체크박스와 가장 가까운 상위 .applyInfo 레이아웃을 찾음
                const applyInfoDiv = cb.closest('.applyInfo');
                
                // onclick 문자열에서 인자값들 추출하는 대신, 안전하게 기존 설계된 구조를 활용하거나 
                // 기존 함수(updateAttendanceStatus)를 트리거 시켜버립니다.
                const btn = applyInfoDiv.querySelector(`.btn-area-confirmA a[data-status="${statusValue}"]`);
                
                if (btn) {
                    // 기존에 정의된 함수를 체크된 유저 수만큼 강제로 호출시킴
                    return eval(btn.getAttribute('onclick').replace('this.dataset.status', `'${statusValue}'`));
                }
            });

            // 일괄 실행 후 완료 메시지 및 새로고침
            Promise.all(promises).then(() => {
                alert(`선택된 인원의 ${statusText} 처리가 요청되었습니다.`);
                location.reload();
            }).catch(err => {
                console.error("일괄 처리 중 에러 발생: ", err);
                location.reload();
            });
        }

        function significantInsert() {
            const campaignId = document.getElementById('campaignId').dataset.campaignId;
            const userNo = document.getElementById('userNo').dataset.campaignTitle;
            const applyDate = document.getElementById('applyDate').dataset.campaignId;
            const reasonInfo = document.getElementById('reasonInfo').value.trim();
            const amountInput = document.querySelector('.input-significant');
            const amount = amountInput.value.trim();

            console.log("significantInsert called with:", {campaignId, userNo, applyDate, amount});
            if (!amount) {
                alert('특이사항 내용을 입력해 주세요.');
                return;
            }

            const requestBody = {
                campaignId: campaignId,
                userId: userNo,
                missionDate: applyDate,
                amount: amount,
                reasonInfo : reasonInfo,
                category: "OVERPAY"
            };

            fetch('/apply/significantInsert', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    [csrfHeader]: csrfToken
                },
                body: JSON.stringify(requestBody)
            })
            .then(response => {
                if (!response.ok) { 
                    return response.json().then(errorData => {
                        throw new Error(errorData.message || '특이사항 등록 중 알 수 없는 오류가 발생했습니다.');
                    });
                }
                return response.json();
            })
            .then(data => {
                alert(data.message);
                amountInput.value = '';
            })
            .catch(error => {
                console.error('특이사항 등록 중 오류 발생:', error);
                alert('특이사항 등록에 실패했습니다: ' + error.message);
            });
        }

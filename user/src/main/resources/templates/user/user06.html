<!DOCTYPE html>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>아이디 찾기</title>
    <link rel="stylesheet" href="/css/login.css">

<body>
    <div class="login-box">
        <h1>로그인</h1>
        <form id="loginForm" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="form-group">
            <input type="text" name="userNm" id="userNm" placeholder="이름" required />
        </div>
        <div class="form-group phone-group">
                <input type="text" id="phoneNum" name="phoneNum" placeholder="01012345678" required pattern="\d{10,11}" />
                <button type="button" id="sendBtn">인증번호 발송</button>
        </div>

        <div class="form-group phone-group hidden">
            <input type="text" id="userId" name="userId" placeholder="01012345678" required pattern="\d{10,11}" />
        </div>
        <div class="form-group auth-group hidden" id="authCodeGroup">
            <div id="authSection">
                <input type="text" id="authCode" placeholder="인증번호 6자리 입력">
                <span id="timer">03:00</span>
                <button type="button" id="verifyBtn">인증확인</button>
            </div>
            <p id="resultMessage"></p>
        </div>
            <button type="submit" id="findIdButton">아이디 찾기</button>
        
        
            <div class="links">
                <a href="/findId">아이디 찾기</a> |
                <a href="/findPassword">비밀번호 찾기</a>
            </div>
        
            <div class="signup">
                아직 회원이 아니신가요? <a href="/user02">회원가입 하기</a>
            </div>
        
            <div class="homepage-link">
                <a href="/">메인 홈페이지로 돌아가기</a>
            </div>
        </form>
    </div>

        let timeLeft = 180; // 3분
        let timerInterval;
    
        function startTimer() {
            const authCodeGroup = document.getElementById('authCodeGroup');
    
            clearInterval(timerInterval);
            authCodeGroup.classList.remove('hidden');
            timerInterval = setInterval(() => {
                let minutes = Math.floor(timeLeft / 60);
                let seconds = timeLeft % 60;
                document.getElementById('timer').textContent = 
                    `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    alert("인증 시간이 만료되었습니다. 다시 시도해주세요.");
                }
                timeLeft--;
            }, 1000);
        }
    
        // 인증확인 버튼 클릭 이벤트
        document.getElementById('verifyBtn').addEventListener('click', () => {
            const inputCode = document.getElementById('authCode').value;
            const phoneNumber = document.getElementById('phoneNum').value;
            fetch('/auth/verifyCode', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded', ...requestHeaders },
                body: new URLSearchParams({ phoneNumber: phoneNumber, inputCode: inputCode })
            })
            .then(res => res.text())
            .then(data => {
                if (data === "인증 성공") {
                    alert("✅ 인증되었습니다!");
                    verifyBtnCode = true;
                    clearInterval(timerInterval);
                    resultMessage.textContent = "인증되었습니다.";
                    // 추가로 인증번호 입력창과 버튼을 비활성화하거나 숨길 수도 있습니다.
                    document.getElementById('phoneNum').disabled = true;
                    // document.getElementById('sendCode').disabled = true;
                    document.getElementById('authCode').disabled = true;
                    document.getElementById('verifyBtn').disabled = true;
                } else {
                    alert(data);
                }
            });
        });
    
        function togglePasswordVisibility(fieldId) {
            const passwordField = document.getElementById(fieldId);
            const toggleButton = passwordField.nextElementSibling; // 바로 다음 형제 요소 (👁️ 버튼)

            if (passwordField.type === "password") {
                passwordField.type = "text"; // 비밀번호 보이게
                toggleButton.textContent = "🔒"; // 아이콘 변경 (선택 사항)
            } else {
                passwordField.type = "password"; // 비밀번호 숨기게
                toggleButton.textContent = "👁️"; // 아이콘 변경 (선택 사항)
            }
        }

        const findIdButton = document.getElementById("findIdButton");
        findIdButton.addEventListener('click', (e) => {
            e.preventDefault();
            const userNm = document.getElementById('userNm').value;
            const phoneNumber = document.getElementById('phoneNum').value;

            const params = new URLSearchParams();
            params.append('userNm', userNm);

            params.append('phoneNum', phoneNumber); // 자바의 @RequestParam("phoneNum")과 일치
            fetch('/findId', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded', ...requestHeaders },
                body: params
            })
            .then(res => res.json())
            .then(data => {
                alert(data.success);
                document.getElementById('userId').parentElement.style.display = 'block';
                document.getElementById('userId').value = data.success;
                document.getElementById('userId').readOnly = true;
                document.getElementById('userId').style.backgroundColor = "#e9ecef"; // 회색조로 변경
                document.getElementById('userId').style.cursor = "not-allowed";      // 금지 아이콘 표시
            });

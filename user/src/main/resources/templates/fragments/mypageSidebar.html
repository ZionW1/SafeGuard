    <script th:inline="javascript">
    const dropArea = document.getElementById("drop-area");
    const imageInput = document.getElementById("image"); // ⭐ id="image"로 변경됨 ⭐
    const preview = document.getElementById("preview");
    const defaultImage = document.getElementById("defaultImage"); // 새로 추가된 기본 이미지
    // 예: 버튼 클릭 등 이벤트에 연결하여 호출
    const csrfHeaderToSend = "X-CSRF-TOKEN"; // 👈 Spring Security가 기본으로 기대하는 헤더 이름!

    // 기존 이미지가 있으면 숨기고, 없으면 보여주기
    if (defaultImage && imageInput.files.length === 0) { // defaultImage가 있고 아직 선택된 파일이 없으면
        defaultImage.style.display = 'block';
        preview.style.display = 'none';
        // imgFile (기존 이미지)도 파일 없으면 숨기기
        const imgFile = document.getElementById("imgFile");
        if (imgFile) imgFile.style.display = 'none';
    }

    dropArea.addEventListener("click", () => imageInput.click()); // 클릭 시 파일 선택창 열림

    // 드래그 오버 / 드래그 리브 / 드롭 이벤트 (기존 코드 그대로)
    dropArea.addEventListener("dragover", (e) => {
        e.preventDefault();
        dropArea.style.backgroundColor = "#f3e7ff";
    });
    dropArea.addEventListener("dragleave", () => {
        dropArea.style.backgroundColor = "transparent";
    });
    dropArea.addEventListener("drop", (e) => {
        e.preventDefault();
        dropArea.style.backgroundColor = "transparent";
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith("image/")) {
            imageInput.files = e.dataTransfer.files; // 드롭된 파일을 input에 설정
            showPreview(file);
        }
    });

    // input 값이 변경될 때 미리보기 업데이트
    imageInput.addEventListener("change", () => {
        const file = imageInput.files[0];
        if (file) {
            showPreview(file);
        } else {
            // 파일 선택이 취소되거나 파일이 없을 때 처리 (기존 이미지 또는 기본 이미지 복구)
            preview.style.display = 'none';
            // 여기서는 `file` 변수에 따라 `imgFile` 또는 `defaultImage`를 다시 보여주는 로직이 필요해.
            // Thymeleaf의 ${file != null} 값은 JS에서 직접 접근하기 어려우므로,
            // 렌더링 시점에 JS 변수에 할당하거나, HTML에서 현재 상태를 나타내는 data-* 속성 등을 활용하는 게 좋아.
            // 예를 들어 <div id="imageDisplayArea" data-has-initial-image="${file != null}"></div>
            // JS에서 이 data-has-initial-image 값을 읽어서 처리
        }
    });

    // 미리보기를 보여주는 함수
    function showPreview(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            // 새 이미지가 선택되었으니 기존 이미지나 기본 이미지는 숨김
            const imgFile = document.getElementById("imgFile");
            if (imgFile) imgFile.style.display = 'none';
            if (defaultImage) defaultImage.style.display = 'none';

            preview.src = e.target.result;
            preview.style.display = "block";
        };
        reader.readAsDataURL(file);
    }

    // 비동기 파일 삭제 요청 함수 (async/await 사용)
    async function markFileDeleted(id) {
        const csrfToken = document.querySelector('input[name="_csrf"]').value;
        const url = `/mypage/markDeleted/${id}`;
        console.log("mark deleted url : " + url);

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    [csrfHeaderToSend]: csrfToken
                }
            });

            // 상태가 200일 때만 처리
            if (response.ok) {
                const text = await response.text();
                if (text === 'SUCCESS') {
                    alert('파일 삭제(상태 변경) 성공');
                    window.location.reload();


                    // preview.src = "";
                } else {
                    alert('파일 삭제(상태 변경) 실패');
                }
            } else {
                const errorText = await response.text();
                alert('파일 삭제(상태 변경) 요청 처리 중 오류 발생: ' + errorText);
            }
        } catch (error) {
            // 네트워크 오류 등 예외 처리
            alert('파일 삭제 요청 중 예외가 발생했습니다: ' + error.message);
        }
    }

    function removeFile(element, id){
                console.log("removeFile: " + id);
                let request = new XMLHttpRequest();

                
                // ⭐️ CSRF 토큰 가져오기 시작 ⭐️
                // hidden input 태그에서 name과 value를 가져와.
                const csrfToken = document.querySelector('input[name="_csrf"]').value;
                // const csrfHeader = document.querySelector('input[name="_csrf"]').name; // 스프링 기본은 "_csrf"야
                const csrfHeaderToSend = "X-CSRF-TOKEN"; // 👈 Spring Security가 기본으로 기대하는 헤더 이름!
                // 만약 parameterName이 다르게 설정되어 있다면, 다음과 같이도 가능해:
                // const csrfHeader = document.querySelector('input[name="_csrf"]').getAttribute('name');

                // meta 태그로 CSRF 토큰을 저장했다면 이렇게 가져올 수도 있어:
                // const csrfToken = document.querySelector("meta[name='_csrf']").getAttribute("content");
                // const csrfHeader = document.querySelector("meta[name='_csrf_header']").getAttribute("content");
                // ⭐️ CSRF 토큰 가져오기 끝 ⭐️
                request.onreadystatechange = function(){
                    if(request.readyState == request.DONE && request.status == 200) {
                        let response = request.responseText;
                        if(response == 'SUCCESS'){
                            alert('파일 삭제(상태 변경) 성공');

                            // ⭐️ 클래스를 사용하여 섹션 숨기기/보이기 ⭐️
                            document.getElementById("existing-file-section").classList.add('hidden');    // 기존 파일 섹션 숨기기
                            document.getElementById("drop-area").classList.remove('hidden');             // 드롭 영역 보이기

                            // 이미지 업로드 <input> 태그의 값을 비워서 파일 선택 상태 초기화
                            document.getElementById("image").value = '';
                            // 미리보기 이미지도 초기 상태로 (src 비우고 hidden 클래스 추가하여 숨김)
                            document.getElementById("preview").classList.add('hidden'); // 미리보기 img 태그 숨기기
                            document.getElementById("preview").src = ""; // 미리보기 이미지 src 비우기

                        }else{
                            alert('파일 삭제(상태 변경) 실패');
                        }
                    } else if (request.readyState == request.DONE && request.status != 200) {
                        alert('파일 삭제(상태 변경) 요청 처리 중 오류 발생: ' + request.responseText);
                    }
                }

                const url = `/mypage/markDeleted/${id}`;
                console.log("mark deleted url : " + url);
                request.open('POST', url, true);
                request.setRequestHeader(csrfHeaderToSend, csrfToken);
                request.send();
            }

    // 초기 로드 시 기존 이미지가 있으면 preview와 imgFile을 적절히 설정
    // 이건 DOMContentLoaded 안에서 처리하는 게 좋아.
    document.addEventListener("DOMContentLoaded", function() {
        const initialImgFile = document.getElementById("imgFile");
        const initialPreview = document.getElementById("preview");
        const initialDefaultImage = document.getElementById("defaultImage");

        if (initialImgFile) { // 기존 파일이 있었으면
            initialImgFile.style.display = 'block';
            initialPreview.style.display = 'none';
            if (initialDefaultImage) initialDefaultImage.style.display = 'none';
        } else { // 기존 파일이 없었으면 기본 이미지
            if (initialDefaultImage) initialDefaultImage.style.display = 'block';
            initialPreview.style.display = 'none';
        }
    });
    </script>
</div>

            function removeFile(element, id){
                console.log("campaign: " + id);
                let request = new XMLHttpRequest();

                // ⭐️ CSRF 토큰 가져오기 시작 ⭐️
                // hidden input 태그에서 name과 value를 가져와.
                const csrfToken = document.querySelector('input[name="_csrf"]').value;
                // const csrfHeader = document.querySelector('input[name="_csrf"]').name; // 스프링 기본은 "_csrf"야
                const csrfHeaderToSend = "X-CSRF-TOKEN"; // 👈 Spring Security가 기본으로 기대하는 헤더 이름!
                // 만약 parameterName이 다르게 설정되어 있다면, 다음과 같이도 가능해:
                // const csrfHeader = document.querySelector('input[name="_csrf"]').getAttribute('name');

                // meta 태그로 CSRF 토큰을 저장했다면 이렇게 가져올 수도 있어:
                // const csrfToken = document.querySelector("meta[name='_csrf']").getAttribute("content");
                // const csrfHeader = document.querySelector("meta[name='_csrf_header']").getAttribute("content");
                // ⭐️ CSRF 토큰 가져오기 끝 ⭐️
                request.onreadystatechange = function(){
                    if(request.readyState == request.DONE && request.status == 200) {
                        let response = request.responseText;
                        if(response == 'SUCCESS'){
                            alert('파일 삭제(상태 변경) 성공');

                            // ⭐️ 클래스를 사용하여 섹션 숨기기/보이기 ⭐️
                            document.getElementById("existing-file-section").classList.add('hidden');    // 기존 파일 섹션 숨기기
                            document.getElementById("drop-area").classList.remove('hidden');             // 드롭 영역 보이기

                            // 이미지 업로드 <input> 태그의 값을 비워서 파일 선택 상태 초기화
                            document.getElementById("image").value = '';
                            // 미리보기 이미지도 초기 상태로 (src 비우고 hidden 클래스 추가하여 숨김)
                            document.getElementById("preview").classList.add('hidden'); // 미리보기 img 태그 숨기기
                            document.getElementById("preview").src = ""; // 미리보기 이미지 src 비우기

                        }else{
                            alert('파일 삭제(상태 변경) 실패');
                        }
                    } else if (request.readyState == request.DONE && request.status != 200) {
                        alert('파일 삭제(상태 변경) 요청 처리 중 오류 발생: ' + request.responseText);
                    }
                }

                const url = `/admin/file/markDeleted/${id}`;
                console.log("mark deleted url : " + url);
                request.open('POST', url, true);
                request.setRequestHeader(csrfHeaderToSend, csrfToken);
                request.send();
            }

        <script>
            const params = new URLSearchParams(location.search);

            function campaignRemove(){
                console.log(id);
                if(!confirm('정말로 이 캠페인을 삭제하시겠습니까?')){
                    return;

                form.submit(); // 요청 전송
            }

    const dropArea = document.getElementById("drop-area");
    const imageInput = document.getElementById("image");
    const preview = document.getElementById("preview");

    dropArea.addEventListener("click", () => imageInput.click());

    dropArea.addEventListener("dragover", (e) => {
        e.preventDefault();
        dropArea.style.backgroundColor = "#f3e7ff";
    });

    dropArea.addEventListener("dragleave", () => {
        dropArea.style.backgroundColor = "transparent";
    });

    dropArea.addEventListener("drop", (e) => {
        e.preventDefault();
        dropArea.style.backgroundColor = "transparent";
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith("image/")) {
            imageInput.files = e.dataTransfer.files;
            showPreview(file);
        }
    });

    imageInput.addEventListener("change", () => {
        const file = imageInput.files[0];
        if (file) {
            showPreview(file);
        }
    });

    function showPreview(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            preview.src = e.target.result;
            preview.style.display = "block";
        };
        reader.readAsDataURL(file);
    }
    
    document.addEventListener("DOMContentLoaded", () => {
        const fileInput = document.getElementById('image');
        const previewImage = document.getElementById('preview');

        if (fileInput && previewImage) {
            // 파일 선택 시 change 이벤트 감지
            fileInput.addEventListener('change', function(event) {
                const file = event.target.files[0]; // 선택된 파일 중 첫 번째 파일 가져오기

                if (file) {
                    const reader = new FileReader(); // 파일을 읽기 위한 FileReader 객체 생성

                    // 파일 읽기가 완료되면 실행될 콜백 함수
                    reader.onload = function(e) {
                        previewImage.src = e.target.result; // 읽은 데이터를 img 태그의 src로 설정
                        previewImage.classList.remove('hidden'); // 미리보기 이미지 보이게 하기 (hidden 클래스 제거)
                        // previewImage.style.display = 'block'; // 만약 hidden 클래스 대신 style.display를 썼다면 이걸로!
                    };

                    reader.readAsDataURL(file); // 파일을 Data URL 형식으로 읽기 (Base64 인코딩된 이미지 데이터)
                } else {
                    // 파일이 선택되지 않았거나 취소되었을 경우 미리보기 초기화
                    previewImage.src = "";
                    previewImage.classList.add('hidden'); // 미리보기 이미지 숨기기 (hidden 클래스 추가)
                    // previewImage.style.display = 'none'; // 만약 hidden 클래스 대신 style.display를 썼다면 이걸로!
                }
            });
        }
    });
        </script>

var element_wrap = document.getElementById('address_search_wrap');

function foldDaumPostcode() {
    document.getElementById('address_modal_background').style.display = 'none';
}

function execDaumPostcode() {
    var element_wrap = document.getElementById('address_search_wrap');
    var modal_bg = document.getElementById('address_modal_background');

    modal_bg.style.display = 'flex'; // 모달 보이기

    new daum.Postcode({
        oncomplete: function(data) {
            var addr = '';
            var extraAddr = '';
            console.log(data.sido);
            if (data.userSelectedType === 'R') {
                addr = data.roadAddress;
            } else {
                addr = data.jibunAddress;
            }

            if(data.userSelectedType === 'R'){
                if(data.bname !== '' && /[동|로|가]$/g.test(data.bname)){
                    extraAddr += data.bname;
                }
                if(data.buildingName !== '' && data.apartment === 'Y'){
                    extraAddr += (extraAddr !== '' ? ', ' + data.buildingName : data.buildingName);
                }
                if(extraAddr !== ''){
                    extraAddr = ' (' + extraAddr + ')';
                }
            }
            console.log(data)
            document.getElementById('zoneCode').value = data.zonecode;
            document.getElementById('address').value = addr + extraAddr;
            document.getElementById('province').value = data.sido;
            document.getElementById('city').value = data.sigungu;
            document.getElementById('roadName').value = data.roadname;
            document.getElementById('roadAddress').value = data.roadAddress;
            // document.getElementById('jibunAddress').value = data.jibunAddress;
            document.getElementById('extraAddress').value = data.bname;

            // document.getElementById('detailAddress').value = ''
            document.getElementById('detailAddress').focus();

            foldDaumPostcode(); // 모달 닫기

        },
        onresize : function(size) {
            element_wrap.style.height = 460 + 'px';
        },
        width : '100%',
        height : '100%'
    }).embed(element_wrap);
}

    // roadAddress detailAddress를 합쳐서 fullAddress를 업데이트하는 함수
    function updateFullAddress() {
        const jibunAddr = document.getElementById('roadAddress').value;      // 숨겨진 지번 주소 (Daum API 결과)
        const detailAddr = document.getElementById('detailAddress').value;    // 사용자가 직접 입력하는 상세 주소

        let combinedAddress = jibunAddr; // 기본은 지번 주소로 시작

        // 상세 주소 필드에 값이 있다면 지번 주소 뒤에 추가
        if (detailAddr.trim() !== '') { // trim()으로 공백 제거 후 내용이 있는지 확인
            combinedAddress += ' ' + detailAddr; // 공백을 넣어 구분
        }
        console.log(combinedAddress);
        // 최종적으로 조합된 주소를 fullAddress hidden 필드에 설정
        document.getElementById('fullAddress').value = combinedAddress.trim(); // 마지막 공백까지 제거
    }

    </script>

    <script th:inline="javascript">
        document.addEventListener('DOMContentLoaded', function() {
            // CSRF 토큰 전역 설정 (Meta 태그에서 가져오기)
            const csrfToken = document.querySelector('meta[name="_csrf"]')?.getAttribute('content');
            const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.getAttribute('content');
        
            const idCert = document.getElementById("id_drop");
            const dropCert = document.getElementById("cert_drop");
            const idImage = document.getElementById("idImage");
            const certImage = document.getElementById("certImage");
            const idPreview = document.getElementById("id_preview");
            const certPreview = document.getElementById("cert_preview");
            const idPlaceholderMessage = document.getElementById("id_placeholder_message");
            const certPlaceholderMessage = document.getElementById("cert_placeholder_message");
            const certUploadForm = document.getElementById("certForm");
        
            // --- [1] 미리보기 및 표시 업데이트 함수 ---
            function showPreview(file, type) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    if (type === "1" && idPreview) {
                        idPreview.src = e.target.result;
                        idPreview.style.display = "block";
                        if (idPlaceholderMessage) idPlaceholderMessage.style.display = "none";
                    } else if (type === "2" && certPreview) {
                        certPreview.src = e.target.result;
                        certPreview.style.display = "block";
                        if (certPlaceholderMessage) certPlaceholderMessage.style.display = "none";
                    }
                };
                reader.readAsDataURL(file);
            }
        
            // --- [2] 드래그 앤 드롭 및 클릭 이벤트 (신분증) ---
            if (idCert && idImage) {
                idCert.addEventListener("click", () => idImage.click());
                idCert.addEventListener("dragover", (e) => { e.preventDefault(); idCert.style.backgroundColor = "#f3e7ff"; });
                idCert.addEventListener("dragleave", () => { idCert.style.backgroundColor = "transparent"; });
                idCert.addEventListener("drop", (e) => {
                    e.preventDefault();
                    idCert.style.backgroundColor = "transparent";
                    const file = e.dataTransfer.files[0];
                    if (file?.type.startsWith("image/")) {
                        idImage.files = e.dataTransfer.files;
                        showPreview(file, "1");
                    }
                });
                // change 이벤트는 submit 밖으로 빼야 합니다.
                idImage.addEventListener("change", () => {
                    if (idImage.files[0]) showPreview(idImage.files[0], "1");
                });
            }
        
            // --- [3] 드래그 앤 드롭 및 클릭 이벤트 (이수증) ---
            if (dropCert && certImage) {
                dropCert.addEventListener("click", () => certImage.click());
                dropCert.addEventListener("dragover", (e) => { e.preventDefault(); dropCert.style.backgroundColor = "#f3e7ff"; });
                dropCert.addEventListener("dragleave", () => { dropCert.style.backgroundColor = "transparent"; });
                dropCert.addEventListener("drop", (e) => {
                    e.preventDefault();
                    dropCert.style.backgroundColor = "transparent";
                    const file = e.dataTransfer.files[0];
                    if (file?.type.startsWith("image/")) {
                        certImage.files = e.dataTransfer.files;
                        showPreview(file, "2");
                    }
                });
                certImage.addEventListener("change", () => {
                    if (certImage.files[0]) showPreview(certImage.files[0], "2");
                });
            }
        
            // --- [4] 신분증 & 이수증 비동기 업로드 버튼 ---
            const uploadBtn = document.getElementById('imageUploadBtnBoth');
            if (uploadBtn) {
                uploadBtn.addEventListener('click', function() {
                    const certFile = certImage?.files[0];
                    const idFile = idImage?.files[0];
                    
                    if (!idFile || !certFile) {
                        alert("신분증과 이수증 이미지를 모두 선택해주세요.");
                        return;
                    }
        
                    const formData = new FormData();
                    formData.append('idImage', idFile);
                    formData.append('certImage', certFile);
                    formData.append('id', document.querySelector('input[name="id"]').value);
                    formData.append('userId', document.querySelector('input[name="userId"]').value);
        
                    fetch('/mypage/uploadImage', {
                        method: 'POST',
                        headers: { [csrfHeader]: csrfToken },
                        body: formData,
                    })
                    .then(res => res.ok ? res.text() : Promise.reject('업로드 실패'))
                    .then(() => {
                        alert('이미지가 성공적으로 업로드되었습니다.');
                        location.reload();
                    })
                    .catch(err => alert(err));
                });
            }

            
        });

        function imageUpload (imageUpload, type) {
            const idFile = document.getElementById("idImage")?.files[0];
            const certFile = document.getElementById("certImage")?.files[0];
            const csrfToken = document.querySelector('meta[name="_csrf"]')?.getAttribute('content');
            const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.getAttribute('content');
            const formData = new FormData();


            // [수정 포인트 1] 유효성 검사 및 데이터 추가 논리 분리
            if (type === '1') {
                if (!idFile) {
                    alert("신분증 이미지를 선택해주세요.");
                    return;
                }
                formData.append('idImage', idFile); // 신분증만 보낼 때
            } else if (type === '2') {
                if (!certFile) {
                    alert("이수증 이미지를 선택해주세요.");
                    return;
                }
                formData.append('certImage', certFile); // 이수증만 보낼 때
            } else if (type === 'all') { // 만약 동시에 올리는 경우가 있다면
                if (!idFile || !certFile) {
                    alert("신분증과 이수증 이미지를 모두 선택해주세요.");
                    return;
                }
                formData.append('idImage', idFile);
                formData.append('certImage', certFile);
            }
        
            formData.append('id', document.querySelector('input[name="id"]').value);
            formData.append('userId', document.querySelector('input[name="userId"]').value);

            fetch('/mypage/uploadImage', {
                method: 'POST',
                headers: { [csrfHeader]: csrfToken },
                body: formData,
            })
            .then(res => res.ok ? res.text() : Promise.reject('업로드 실패'))
            .then(() => {
                alert('이미지가 성공적으로 업로드되었습니다.');
                location.reload();
            })
            .catch(err => alert(err));
        }
        // --- [5] 이미지 삭제 함수 (전역) ---
        function fileRemove(userId, type) {
            if (!confirm("정말로 이미지를 삭제하시겠습니까?")) return;
            
            const csrfToken = document.querySelector('meta[name="_csrf"]')?.getAttribute('content');
            const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.getAttribute('content');
        
            const formData = new FormData();
            formData.append('userId', userId);
            formData.append('type', type);
        
            fetch('/mypage/deleteImage', {
                method: 'POST',
                headers: { [csrfHeader]: csrfToken },
                body: formData
            })
            .then(res => res.ok ? res.text() : Promise.reject('삭제 실패' + res.text()))
            .then(() => {
                alert('이미지가 삭제되었습니다.');
                location.reload();
            })
            .catch(err => alert(err));
        }

        const infoForm = document.getElementById("form");
        infoForm.addEventListener('submit', function(e) {
            e.preventDefault();
            let getAddress = /*[[${getAddress}]]*/ null;
            const phoneNum = document.getElementById("phoneNum")?.value || "";
            const bankNm = document.getElementById("bankNm")?.value || "";
            const accountNumber = document.getElementById("accountNumber")?.value || "";
            const depositor = document.getElementById("depositor")?.value || "";
            const detailAddress = document.getElementById("detailAddress")?.value || "";
            const address = document.getElementById("address")?.value || "";
            
            if (getAddress == null) {
                if (!bankNm || !accountNumber || !depositor || !detailAddress || !address || !phoneNum) {
                    alert('개인 정보를 모두 입력하고 저장해주세요.');
                    return;
                }
            } else {
                if (!bankNm || !accountNumber || !depositor || !phoneNum) {
                    alert('은행 정보와 연락처를 모두 입력하고 저장해주세요.');
                    return;
                }
            }

            const formData = new FormData(infoForm);
            // for (let [key, value] of formData.entries()) {
            //     console.log(key + ': ' + value);
            // }
            formData.set('phoneNum', phoneNum);
            formData.set('bankNm', bankNm);
            formData.set('accountNumber', accountNumber);
            formData.set('depositor', depositor);
            formData.set('detailAddress', detailAddress);
            formData.set('address', address);

            fetch('/mypage/updateInfo', {
                method: 'POST',
                headers: { [csrfHeader]: csrfToken },
                body: formData
            })
            .then(res => {
                if (!res.ok) throw new Error('저장 실패');
                    return res.json();
            })
            .then(data => {
                if (data.duplicate) {
                alert("이미 가입된 번호입니다. 로그인 페이지로 이동하세요.");
                return;
                } else {
                    alert("신청이 완료되었습니다!");
                }
            })
            .catch(err => {
                console.error(err);
                alert("오류 발생: " + err.message);
            });
        });

        // --- [6] 경호원 신청 함수 (전역) ---
        function ApplyBodyguard(param) {
            let user = /*[[${user}]]*/ null;
            let getAddress = /*[[${getAddress}]]*/ null;
            const imgCertFile = document.getElementById('imgCertFile');
            const imgIdttFile = document.getElementById('imgIdttFile');
            const imgFile = document.getElementById('imgFile');
            const bankNm = user?.bankNm;
            const accountNumber = user?.accountNumber;
            const depositor = user?.depositor;
            const getFullAddress = getAddress?.fullAddress;

            if (!imgFile?.src || imgFile.src.includes('not-image')) {
                alert('프로필 이미지가 없습니다.'); return;
            }
            if (!imgIdttFile?.src || imgIdttFile.src.includes('not-image')) {
                alert('신분증 이미지가 없습니다.'); return;
            }
            if (!imgCertFile?.src || imgCertFile.src.includes('not-image')) {
                alert('이수증 이미지가 없습니다.'); return;
            }
            if (!bankNm || !accountNumber || !depositor) {
                alert('계좌 정보(은행, 계좌번호, 예금주)를 모두 입력하고 저장해주세요.');
                return;
            }
            if (!getFullAddress) {
                alert('주소를 등록하고 저장해주세요.');
                return;
            }
        
            if(!confirm("경호원 신청을 하시겠습니까?")) return;
        
            const csrfToken = document.querySelector('meta[name="_csrf"]')?.getAttribute('content');
            const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.getAttribute('content');
        
            const form = document.getElementById('form');
            const formData = new FormData(form);
            formData.append('guardType', param);
        
            fetch('/mypage/applyBodyguard', {
                method: 'POST',
                headers: { [csrfHeader]: csrfToken },
                body: formData
            })
            .then(res => res.ok ? res.json() : Promise.reject('저장 실패'))
            .then(data => alert("신청이 완료되었습니다!"))
            .catch(err => alert("오류 발생: " + err));
        }
        </script>

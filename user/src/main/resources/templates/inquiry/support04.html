<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
                xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
                layout:decorate="~{layouts/base_layout}">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>공지사항</title>
    <link rel="stylesheet" href="/css/support_style.css" />
    <style>
    /* 메인 콘텐츠 스타일 */
    .main-content {
        width: 90%;
        margin: 0 auto;
        box-sizing: border-box;
        min-height: 100vh;
        background-color: #fff;
    }

    /* 공지사항 테이블 스타일 */
    .notice-table {
        float: right;
        min-width: 80%;
        border-collapse: collapse; /* 테이블 셀 경계선 병합 */
        margin-bottom: 25px;
        /* margin-right: 100px; */
    }

    .notice-table th, .notice-table td {
        padding: 20px 10px;
        border-bottom: 1px solid #eee;
        text-align: center;
        font-size: 20px;
    }

    .notice-table th {
        /* background-color: #f2f2f2; */
        font-weight: 600;
        color: #555;
        white-space: nowrap; /* 제목 등 셀 너비 유지 */
    }

    /* 1. 제목 칸 설정 */
.notice-table td.title {
    max-width: 200px; /* 화면 크기에 따라 적절히 조절 (예: 150px~250px) */
    padding: 10px;
    vertical-align: middle;
}

/* 2. 실제 스크롤이 발생하는 박스 */
.title-scroll-box {
    display: block;
    width: 100%;           /* 부모 td 너비에 맞춤 */
    overflow-x: auto;      /* 가로 방향으로 넘치면 스크롤 생성 */
    white-space: nowrap;   /* 글자가 아래로 떨어지지 않게 한 줄로 고정 */
    -webkit-overflow-scrolling: touch; /* 모바일에서 부드러운 스크롤 */
    
    /* 텍스트 정렬은 원하는 대로 */
    text-align: left; 
}

/* 3. 스크롤바 디자인 (모바일에서 깔끔하게 보이도록 숨기거나 최소화) */
.title-scroll-box::-webkit-scrollbar {
    height: 2px; /* 아주 얇게 설정 */
}
.title-scroll-box::-webkit-scrollbar-thumb {
    background: rgba(0,0,0,0.1); /* 살짝 보일듯 말듯한 회색 */
    border-radius: 10px;
}

    .notice-table tr:hover {
        background-color: #fdfdfd;
    }

    .notice-title{
        font-size: 40px;
        font-weight: 700;
        margin: 5%;
        padding-bottom: 10px;
        color: #111;
    }

    </style>
</head>
<body>
<!-- <th:block th:replace="~{fragments/navigator :: main-navigator}" /> -->
<main layout:fragment="content">
    <div class="main-side-content">
        <div class="container">
            <th:block th:replace="~{fragments/noticeSidebar :: sidebarMenu}" />
        </div>
        <h1 class="notice_title_list consultation-title">1:1 문의</h1>

        <div class="form-container">
            <form th:action="@{/support/submit}" method="post">
                <div class="input-grid">

                    <!-- <div class="input-group">
                        <label class="input-label">지역 <span class="label-star">*</span> <span class="label-sub">(더 맞춤화 된 서비스 제공 목적)</span></label>

                            <option value="incheon">인천</option>
                        </select>

                </div>
                <div class="input-grid-title">
                    <div class="input-group">
                        <input type="text" name="title" class="form-input" placeholder="제목을 입력해주세요">
                    </div>
                    </div>
                <div class="input-group">
                    <label class="input-label">문의 내용</label>
                    <textarea name="content" class="form-textarea" 
                            placeholder="상담 가능 시간 (예. 오후 1시~3시 사이):&#10;&#10;상세 문의 내용 (예. 체험단 단가 문의드립니다.):"></textarea>
                </div>

                <div class="agreement-section">
                    <label class="agree-item">
                        <input type="checkbox" name="agree" required>
                        <span class="agree-link">개인정보 수집·이용 및 광고성 정보 수신 전체 동의</span>
                    </label>
                </div>

                <div class="submit-btn-wrap">

        <div class="notice-box">

        </div>
    </div>
    <script th:inline="javascript">
        let supportData = /*[[${supportList}]]*/ null;
        console.log('supportList :' + JSON.stringify(supportData));
            document.addEventListener('DOMContentLoaded', function() {
            // 모든 질문(faq-question) 요소를 선택합니다.
            const questions = document.querySelectorAll('.faq-question');
    
            questions.forEach(question => {
                question.addEventListener('click', function() {
                    // 클릭된 질문의 부모 요소인 .faq-item을 찾습니다.
                    const faqItem = this.parentElement;
                    const arrow = this.querySelector('.arrow');
    
                    // 현재 클릭한 아이템이 열려있는지 확인합니다.
                    const isOpen = faqItem.classList.contains('open');
    
                    // (선택사항) 다른 열려있는 질문들을 모두 닫고 싶다면 아래 코드를 활성화하세요.
                    /*
                    document.querySelectorAll('.faq-item').forEach(item => {
                        item.classList.remove('open');
                        item.querySelector('.arrow').textContent = '∨';
                    });
                    */
    
                    // 상태를 반전시킵니다.
                    if (isOpen) {
                        console.log("a")
                        faqItem.classList.remove('open');
                        arrow.textContent = '∨';
                    } else {
                        console.log("b")
                        faqItem.classList.add('open');
                        arrow.textContent = '∧';
                    }
                });
            });
        });
    </script>

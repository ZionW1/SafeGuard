<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <th:block th:replace="~{fragments/csrfFragments :: metaCsrf}"></th:block>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <title>Document</title>
</head>
<body>
    <div class="admin-container">
        <div th:replace="~{fragments/sidebar :: sidebarFragment}"></div>
        <div class="main-content">
            <h1><a th:href="@{/user01}">유저 목록</a></h1>
            <form class="optionForm" th:action="@{/user01}" method="get" id="form">
                <input type="hidden" id="savedKeyword" th:value="${option.keyword}">
                <select class="search_keyword" id="searchCode" name="code" onchange="changeSearchInput()">
                    <option value="0" th:selected="${option.code==0}">전체</option>
                    <option value="1" th:selected="${option.code==1}">아이디</option>
                    <option value="2" th:selected="${option.code==2}">이름</option>
                    <option value="3" th:selected="${option.code==3}">이메일</option>
                    <option value="4" th:selected="${option.code==4}">추천인</option>
                    <option value="5" th:selected="${option.code==5}">휴대폰번호</option>
                    <option value="6" th:selected="${option.code==6}">역할</option>
                    <option value="7" th:selected="${option.code==7}">정지유무</option>
                </select>
                <select class="search_keyword" name="orderCode" id="order-code">
                    <option value="0" th:selected="${option.orderCode == 0}">최신순</option>
                    <option value="1" th:selected="${option.orderCode == 1}">포인트순</option>
                    <option value="2" th:selected="${option.orderCode == 2}">추천인</option>
                    <option value="3" th:selected="${option.orderCode == 3}">역할</option>
                </select>
                <div id="inputArea" style="display: inline-block;">
                    <input type="text" class="search_keyword" id="keyword" name="keyword" th:value="${option.keyword}" placeholder="검색어를 입력해 주세요." style="width: 160px;">
                </div>
                <!-- <input type="text" name="keyword"  th:value="${param.keyword}"> -->
                <input class="optionSubmit" type="submit" value="검색">
                
            </form>
            <table class="campaign_Table" border="1">
                <colgroup>
                    <col width="5%"></col>
                    <col width="10%"></col>
                    <col width="5%"></col>
                    <col width="*"></col>
                    <col width="10%"></col>
                    <col width="10%"></col>
                    <col width="10%"></col>
                    <col width="10%"></col>
                    <col width="10%"></col>
                </colgroup>
                <thead>
                    <th class="wdt5">No</th>
                    <th class="wdt10">아이디</th>
                    <th class="wdt10">이름</th>
                    <th class="wdt15">이메일</th>
                    <th class="wdt10">추천인</th>
                    <th class="wdt10">휴대폰번호</th>
                    <th class="wdt11">포인트</th>
                    <!-- <th class="wdt15">주소</th> -->
                    <th class="wdt10">역할</th>
                    <th class="wdt8">정지</th>
                </thead>
                <tbody>
                    <th:block th:if="${userList.isEmpty()}">
                        <tr>
                            <td colspan="9" align="center">조회된 데이터가 없습니다.</td>
                        </tr>
                    </th:block>
                    <th:block th:each="user, stat: ${userList}">
                        <tr class="pointer" th:onclick="|location.href='@{/user02(id=${user.id}, keyword=${option.keyword}, code=${option.code}, orderCode=${option.orderCode}, page=${page.page})}'|">
                            <!-- <a th:href="@{/user02(id=${user.id}, page=${paging.page})}"></a> -->
                            <!-- th:onclick="|location.href='@{/user02(id=${user.id})}'|" -->
                            <td><span th:text="${user.id}"></span></td>
                            <td><span th:text="${user.userId}"></span></td>
                            <td><span th:text="${user.userNm}"></span></td>
                            <td><span th:text="${user.email}"></span></td>
                            <td><span th:text="${user.referrerId}"></span></td>
                            <td><span th:text="${user.phoneNum}"></span></td>
                            <td><span th:text="${user.pendingPoint}"></span></td>
                            <!-- <td>
                                <span th:if="${user.fullAddress != null}" th:text="${user.fullAddress}"></span>
                                <span th:if="${user.fullAddress == null}">- 주소 없음 -</span>
                            </td> -->

                            
                            <!-- <td><span th:text="${userAdressList.fullAddress}"></span></td> -->
                            <td><span th:text="${user.guardTypeNm}"></span></td>
                            <td><span th:text="${user.isStopped}"></span></td>
                            <!-- <td><button type="button" class="" onclick="leaderUpdate()">인솔자 변경</button></td> -->

                        </tr>
                    </th:block>
                </tbody>
            </table>
            <div class="parent">
                <div class="child">
                <a th:href="@{${pageUrl} + '&page=' + ${page.first}}">[처음]</a>
                <th:block th:if="${page.page != page.first }">
                    <a th:href="@{${pageUrl} + '&page=' + ${page.prev}}">[이전]</a>
                </th:block>
                <th:block th:each="no : ${#numbers.sequence(page.start, page.end)}">
                    <th:block th:if="${page.page == no}">
                        <b><span th:text="${no}"></span></b>
                    </th:block>
                    <th:block th:if="${page.page != no}">
                        <a th:href="@{${pageUrl} + '&page='+${no}}" th:text="${no}"></a>
                    </th:block>
                </th:block>
                <th:block th:if="${page.page != page.last }">
                    <a th:href="@{${pageUrl} + '&page=' + ${page.next}}">[다음]</a>
                </th:block>
                <a th:href="@{${pageUrl} + '&page=' + ${page.last}}">[마지막]</a>
            </div>
            </div>
            <div class="">
                <button type="button" class="update-btn" id="resetPointBtn">포인트 초기화</button>
                <button type="button" class="calculate-btn" onclick="settlementAll()">정산하기</button>
            </div>
            <div class="mgl439per">
                <a th:href="@{/campaign03}" class="insert">등록</a>
            </div>
        </div>
    </div>

    <script th:src="@{/js/common.js}"></script>
    <script th:inline="javascript">
        window.onload = function() {
            const searchCode = document.getElementById('searchCode');
            const savedKeyword = document.getElementById('savedKeyword').value;
            console.log(savedKeyword)

            if (searchCode.value == "6") {
                // 현재 검색 조건이 '경호타입'이면 select 박스로 강제 변경
                changeSearchInput(); 
                
                // 서버에서 받아온 상세 값(01, 02 등)을 다시 선택 상태로 만듦
                // const keywordElement = document.getElementsByName('keyword');
                // if (keywordElement) {
                //     keywordElement.value = savedKeyword; // 타임리프 문법
                // }
            }
        };
        function leaderUpdate(){
            console.log("${userList[0].createdAt}");
            if(!confirm('이 사용자를 인솔자로 변경하시겠습니까?')){
                return;
            }
            const form = document.querySelector('form');

            form.action = '/admin/user05'; // action 속성 변경
            form.submit(); // 요청 전송
        }

        function leaderUpdate(){
            if(!confirm('변경하시겠습니까?')){ return; }

            const formData = new FormData(document.getElementById('form'));

            fetch('/admin/user05', {
                method: 'POST',
                body: formData // 폼 데이터를 그대로 실어 보냄
            })
            .then(response => {
                if(response.ok) {
                    alert("변경되었습니다.");
                    location.reload(); // 성공 후 새로고침
                } else {
                    alert("에러가 발생했습니다.");
                }
            });
        }
        function changeSearchInput() {
            const code = document.getElementById('searchCode').value;
            const inputArea = document.getElementById('inputArea');
            const savedKeyword = document.getElementById('savedKeyword').value; // Hidden input에서 가져온 값

            if (code == "6") {
                // 경호타입 선택 시 select 박스로 교체
                inputArea.innerHTML = `
                    <select class="search_keyword" id="dynamicSelect" name="keyword">
                        <option value="00">스텝</option>
                        <option value="01">경호원 신청 중</option>
                        <option value="02">경호원</option>
                        <option value="03">수행</option>
                        <option value="04">인솔자</option>
                    </select>
                `;
                // 2. 생성된 select 박스에 즉시 값 할당
                const dynamicSelect = document.getElementById('dynamicSelect');
                if (dynamicSelect && savedKeyword) {
                    dynamicSelect.value = savedKeyword;
                }
            } else {
                // 그 외에는 일반 텍스트 입력창
                inputArea.innerHTML = `<input class="search_keyword" type="text" name="keyword" placeholder="검색어를 입력해 주세요.">`;
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            const resetBtn = document.getElementById('resetPointBtn');

            if (resetBtn) {
                resetBtn.addEventListener('click', function() {
                    if (!confirm("정말로 포인트를 초기화하시겠습니까?")) return;

                    // 보낼 데이터 (예: userNo가 36인 경우)
                    const userNo = 36; 

                    // fetch 요청 시작
                    fetch('/user/resetPoint', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded',
                        },
                        body: new URLSearchParams({
                            'userNo': userNo
                        })
                    })
                    .then(response => {
                        if (response.ok) {
                            return response.text(); // 서버에서 "success" 같은 문자열을 줄 때
                        }
                        throw new Error('네트워크 응답에 문제가 있습니다.');
                    })
                    .then(data => {
                        if (data === "success") {
                            alert("포인트가 초기화되었습니다.");
                        } else {
                            alert("초기화 실패: " + data);
                        }
                    })
                    .catch(error => {
                        console.error('Error:', error);
                        alert("오류가 발생했습니다. 다시 시도해주세요.");
                    });
                });
            }

            document.getElementById('globalCalcBtn').addEventListener('click', function() {
                // 1차 확인
                if (!confirm("시스템 내 모든 미정산 데이터를 일괄 정산하시겠습니까?")) return;
                
                // 2차 확인 (실수 방지용)
                const safetyCheck = prompt("실행하시려면 '전체정산'이라고 입력해주세요.");
                if (safetyCheck !== "전체정산") {
                    alert("입력이 일치하지 않아 취소되었습니다.");
                    return;
                }

                const btn = this;
                btn.disabled = true;
                btn.innerText = "정산 처리 중... (창을 닫지 마세요)";

                fetch('/admin/api/v1/calculate-all-users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        alert(`총 ${data.processedCount}건의 정산이 완료되었습니다!`);
                        location.reload(); 
                    } else {
                        alert("에러 발생: " + data.message);
                        btn.disabled = false;
                        btn.innerText = "시스템 전체 유저 일괄 정산 실행";
                    }
                })
                .catch(err => {
                    console.error(err);
                    alert("서버 응답 지연 또는 오류가 발생했습니다.");
                    btn.disabled = false;
                });
            });
        });

        async function settlementAll() {
            const csrfToken = /*[[${_csrf.token}]]*/ '';
            const csrfHeader = /*[[${_csrf.headerName}]]*/ '';
            if (!confirm("포인트가 있는 모든 유저를 일괄 정산하시겠습니까?\n이 작업은 취소할 수 없습니다.")) return;

            // 2차 확인 (실수 방지용)
            const safetyCheck = prompt("실행하시려면 '전체정산'이라고 입력해주세요.");
            if (safetyCheck !== "전체정산") {
                alert("입력이 일치하지 않아 취소되었습니다.");
                return;
            }
            console.log("a      ");
            try {
                const response = await fetch('/admin/settlementAll', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        [csrfHeader]: csrfToken
                        // [csrfHeader]: csrfToken  // 헤더에 CSRF 토큰 추가!
                    },
                });
                const result = await response.json();
                console.log(result);
                if (result.success) {
                    alert(`${result.count}명의 포인트 정산이 완료되었습니다!`);
                    location.reload(); // 변경된 포인트 확인을 위해 새로고침
                } else {
                    alert("정산 처리 중 오류: " + result.message);
                }
            } catch (err) {
                alert("서버 통신 실패" + err);
            }
        }
    </script>
</body>
</html>

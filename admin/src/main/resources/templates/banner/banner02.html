<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <th:block th:replace="~{fragments/csrfFragments :: metaCsrf}"></th:block>

    <link rel="stylesheet" th:href="@{/css/style.css}" />
  <title>전체 배너 목록</title>
    <style>
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        h3 {
            font-size: 28px;
            margin-bottom: 24px;
        }
        .form-item {
            margin-bottom: 20px;
        }
        .field-label {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
            display: block;
        }
        .text-field {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
            font-family: 'Pretendard', sans-serif;
        }
        .help-text {
            font-size: 13px;
            color: #637381;
            margin-top: 4px;
        }
        .upload-container {
            display: flex;
            flex-direction: column;
        }
        .upload-box {
            width: 90%;
            border: 2px dashed #ccc;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 10px;
        }
        .upload-box:hover {
            border-color: #1976d2;
        }
        .preview-image {
            max-width: 100%;
            max-height: 200px;
            margin-top: 10px;
            display: none;
        }
        .button-container {
            width: 100%;
            display: flex;
            justify-content: flex-end;
        }
        .submit-button {
            width: 10rem;
            height: 3rem;
            font-size: 1.05rem;
            background-color: #1976d2;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .submit-button:hover {
            background-color: #1565c0;
        }
    </style>
</head>
<body>
<div class="admin-container">
    <div th:replace="~{fragments/sidebar :: sidebarFragment}"></div>

    <div class="main-content">
        <h1>  <a th:href="@{/banner02(id=${bannerSelect.bannerId}, targetType='banner')}">배너 수정</a>
        </h1>
        <form class="normalForm" id="banner-form" th:action="@{/banner02}" method="post" enctype="multipart/form-data">
            <th:block th:replace="fragments/csrfFragments :: inputCsrf"></th:block>

            <input type="hidden" name="bannerId" th:value="${bannerSelect.bannerId}"/>
            <div class="form-item">
                <label class="field-label">배너명</label>
                <input type="text" class="text-field" name="title" id="title" placeholder="배너명을 입력하세요." th:value="${bannerSelect.title}" required>
            </div>

            <div class="form-item">
                <label class="field-label">URL 입력</label>
                <input type="url" class="text-field" name="url" id="url" placeholder="예) https://www.naver.com" th:value="${bannerSelect.url}" required>
            </div>

            <div class="form-group">
                <div class="form-group">
                    <label>배너 이미지</label>
                    <div id="existing-file-section" th:classappend="${file == null} ? 'hidden'">
                        <div class="mrg_auto">
                            <img class="image_view"id="imgFile" th:src="@{|/banner/img?id=${bannerSelect.bannerId}|}" alt="파일이미지"/>
                        </div>
                        <button type="button" style="margin-top: 10px; background-color: #aaa; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer;"
                                th:onclick="bannerRemoveFile(this, [[${bannerSelect.bannerId}]])">기존 이미지 삭제</button>
                    </div>
                    <div class="upload-box" id="upload-box" th:classappend="${file != null} ? 'hidden'" style="border: 2px dashed #b594ff; padding: 20px; text-align: center; border-radius: 8px;">
                        <p>이미지를 여기에 끌어다 놓거나 클릭하여 업로드하세요</p>
                        <div>
                            <input type="file" name="file" id="file" accept="image/*"style="display: none;">
                            <!-- <img id="preview-image" class="preview-image" alt="배너 이미지 미리보기"> -->
                            <img id="preview-image" class="preview-image" th:src="@{|/banner/img?id=${bannerSelect.bannerId}|}" alt="파일이미지" width="720" height="405" />
                        </div>
                    </div>
                </div>
            </div>

            <!-- <div class="form-item">
                <label class="field-label">배너 사진*</label>
            

                <div class="upload-container">
                    <div class="upload-box" id="upload-box">
                        <p>이미지를 여기에 끌어다 놓거나 클릭하여 업로드하세요</p>
                        <input type="file" name="file" id="file" accept="image/*" width="720" height="405" style="display: none;">
                        <img id="preview-image" class="preview-image" alt="배너 이미지 미리보기">
                        <img id="imgFile" th:src="@{|/banner/img?id=${bannerSelect.bannerId}|}" alt="파일이미지" width="720" height="405" />

                    </div>
                    <p class="help-text">배너 이미지를 업로드해 주세요</p>
                </div>
            </div> -->

            <div class="button-container">
                <button type="submit" class="submit-button">수정</button>
            </div>
        </form>
    </div>
</div>

<script>
    // 파일 업로드 관련 기능
    const uploadBox = document.getElementById('upload-box');
    const fileInput = document.getElementById('file');
    const previewImage = document.getElementById('preview-image');
    let bannerImage = "";
    
    // 클릭 시 파일 선택 창 열기
    uploadBox.addEventListener('click', () => {
        fileInput.click();
    });
    
    // 파일 드래그 앤 드롭 기능
    uploadBox.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadBox.style.borderColor = '#1976d2';
    });
    
    uploadBox.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadBox.style.borderColor = '#ccc';

        if (e.dataTransfer.files.length) {
            handleFile(e.dataTransfer.files[0]);
        }
    });
    
    // 파일 선택 시 처리
    fileInput.addEventListener('change', (e) => {
        console.log(e.target.files.length);
        if (e.target.files.length) {
            handleFile(e.target.files[0]);
        }
    });
    
    // 파일 처리 함수
    function handleFile(file) {
        if (file && file.type.startsWith('image/')) {
            document.getElementById('imgFile').style.display = 'none';
            bannerImage = file;
            
            // 이미지 미리보기 표시
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImage.src = e.target.result;
                previewImage.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }
    }

    function bannerRemoveFile(element, id){
        console.log("campaign: " + id);
        let request = new XMLHttpRequest();

        // ⭐️ CSRF 토큰 가져오기 시작 ⭐️
        // hidden input 태그에서 name과 value를 가져와.
        const csrfToken = document.querySelector('input[name="_csrf"]').value;
        // const csrfHeader = document.querySelector('input[name="_csrf"]').name; // 스프링 기본은 "_csrf"야
        const csrfHeaderToSend = "X-CSRF-TOKEN"; // 👈 Spring Security가 기본으로 기대하는 헤더 이름!
        // 만약 parameterName이 다르게 설정되어 있다면, 다음과 같이도 가능해:
        // const csrfHeader = document.querySelector('input[name="_csrf"]').getAttribute('name');

        // meta 태그로 CSRF 토큰을 저장했다면 이렇게 가져올 수도 있어:
        // const csrfToken = document.querySelector("meta[name='_csrf']").getAttribute("content");
        // const csrfHeader = document.querySelector("meta[name='_csrf_header']").getAttribute("content");
        // ⭐️ CSRF 토큰 가져오기 끝 ⭐️
        request.onreadystatechange = function(){
            if(request.readyState == request.DONE && request.status == 200) {
                let response = request.responseText;
                if(response == 'SUCCESS'){
                    alert('파일 삭제(상태 변경) 성공');

                            // ⭐️ 클래스를 사용하여 섹션 숨기기/보이기 ⭐️
                            document.getElementById("existing-file-section").classList.add('hidden');    // 기존 파일 섹션 숨기기
                            document.getElementById("upload-box").classList.remove('hidden');             // 드롭 영역 보이기

                            // 이미지 업로드 <input> 태그의 값을 비워서 파일 선택 상태 초기화
                            document.getElementById("file").value = '';
                            // 미리보기 이미지도 초기 상태로 (src 비우고 hidden 클래스 추가하여 숨김)
                            document.getElementById("preview").classList.add('hidden'); // 미리보기 img 태그 숨기기
                            document.getElementById("preview").src = ""; // 미리보기 이미지 src 비우기

                }else{
                    alert('파일 삭제(상태 변경) 실패');
                }
            } else if (request.readyState == request.DONE && request.status != 200) {
                alert('파일 삭제(상태 변경) 요청 처리 중 오류 발생: ' + request.responseText);
            }
        }

        const url = `/admin/bannerRemoveFile?id=${id}`;
        console.log("mark deleted url : " + url);
        request.open('POST', url, true);
        request.setRequestHeader(csrfHeaderToSend, csrfToken);
        request.send();
    }
    
    // 페이지 로드 시 초기화 작업
    document.addEventListener('DOMContentLoaded', () => {
        // 필요한 초기화 작업이 있다면 여기에 추가
        console.log('배너 상세보기 페이지가 로드되었습니다.');
    });
</script>
</body>
</html>

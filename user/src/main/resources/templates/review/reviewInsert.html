<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
                xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
                layout:decorate="~{layouts/base_layout}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>인솔자 리뷰 등록</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
        }
        /* 제목 입력창 */
        .input-title {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        /* 파일 첨부 (드래그 앤 드롭 영역) */
        .upload-box {
            border: 2px dashed #bbb;
            background-color: #fafafa;
            padding: 30px;
            text-align: center;
            color: #666;
            cursor: pointer;
            border-radius: 4px;
            position: relative;
        }
        .upload-box:hover {
            background-color: #f1f1f1;
            border-color: #888;
        }
        #thumbnail-preview {
            max-width: 200px;
            margin-top: 10px;
            display: none;
            border-radius: 4px;
        }
        /* Quill 에디터 높이 설정 */
        #editor-container {
            height: 450px;
            background-color: #fff;
        }
        /* 버튼 영역 */
        .btn-area {
            text-align: right;
            margin-top: 20px;
        }
        .btn-submit {
            background-color: #4CAF50;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }
        .btn-submit:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <layout:fragment layout:fragment="content">
        <div class="container" style="margin-top: 30px;">
            <h2>인솔자 리뷰 작성</h2>
            <hr style="border: 0; height: 1px; background: #ddd; margin-bottom: 25px;">
    
            <form id="reviewForm">
                <input type="hidden" id="campaignId" name="campaignId" th:value="${campaignId}">
                <input type="hidden" id="userId" name="userId" th:value="${userId}">
    
                <div class="form-group">
                    <label for="title">제목</label>
                    <input type="text" id="title" name="title" class="input-title" placeholder="리뷰 제목을 입력해주세요." th:value="${campaignTitle}" readonly>
                </div>
    
                <div class="form-group">
                    <label for="address">방문 장소 (지도 표시용 주소)</label>
                    <input type="text" id="address" name="address" class="input-title" placeholder="예: 경기도 광명시 하안동 OO번지" th:value="${placeAddr}" readonly>
                </div>
    
                <div class="form-group">
                    <label for="blog_url">블로그 url</label>
                    <input type="text" id="blog_url" name="blog_url" class="input-title" placeholder="블로그 URL을 입력해주세요.">
                </div>
    
                <div class="form-group">
                    <label>대표 이미지 (썸네일)</label>
                    <div class="upload-box" id="drop-zone">
                        <p>📄 파일을 마우스로 끌어오거나 클릭하여 선택하세요 (최대 10MB)</p>
                        <input type="file" id="thumbnail-file" name="thumbnail" accept="image/*" style="display: none;">
                        <img id="thumbnail-preview" alt="썸네일 미리보기">
                    </div>
                </div>
    
                <div class="btn-area">
                    <button type="button" class="btn-submit" onclick="submitReview()">리뷰 등록하기</button>
                </div>
            </form>
        </div>
    
        <script>
            // ==========================================
            // 2. 드래그 앤 드롭 & 파일 첨부 UI 로직
            // ==========================================
            const dropZone = document.getElementById('drop-zone');
            const fileInput = document.getElementById('thumbnail-file');
            const preview = document.getElementById('thumbnail-preview');
    
            dropZone.addEventListener('click', () => fileInput.click());
    
            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.style.backgroundColor = '#f1f1f1';
            });
    
            dropZone.addEventListener('dragleave', () => {
                dropZone.style.backgroundColor = '#fafafa';
            });
    
            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.style.backgroundColor = '#fafafa';
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    fileInput.files = files;
                    showPreview(files[0]);
                }
            });
    
            fileInput.addEventListener('change', (e) => {
                if (e.target.files.length > 0) {
                    showPreview(e.target.files[0]);
                }
            });
    
            function showPreview(file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    preview.src = e.target.result;
                    preview.style.display = 'inline-block';
                };
                reader.readAsDataURL(file);
            }
    
            // ==========================================
            // 3. 서버로 전송 (Submit)
            // ==========================================
            async function submitReview() {
                const title = document.getElementById('title').value;
                const address = document.getElementById('address').value;
                const campaignId = document.getElementById('campaignId').value;
                const userId = document.getElementById('userId').value;
                const blogUrl = document.getElementById('blog_url').value; // 블로그 URL 변수 추가
                const thumbnailFile = fileInput.files[0];
    
                if (!title.trim()) {
                    alert("제목은 필수 입력 사항입니다.");
                    return;
                }
    
                // 서버 전송을 위한 FormData 객체 생성
                const formData = new FormData();
                formData.append('title', title);
                formData.append('address', address);
                formData.append('campaignId', campaignId);
                formData.append('userId', userId);
                formData.append('blogUrl', blogUrl); // 필요 시 서버 DVO 구조에 맞게 전송
                
                if (thumbnailFile) {
                    formData.append('thumbnail', thumbnailFile); 
                }
    
                try {
                    const response = await fetch('/review04', {
                        method: 'POST',
                        body: formData
                    });
    
                    if (response.ok) {
                        alert("리뷰가 성공적으로 등록되었습니다!");
                        
                        // 💡 일반 페이지 이동 형태라면 window.close() 대신 이전 상세 화면으로 백시킵니다.
                        // 만약 이 화면이 팝업창(Popup)으로 열린 게 맞다면 window.close()를 유지하세요.
                        if (window.opener) {
                            window.close();
                        } else {
                            window.location.href = '/review03/' + campaignId; 
                        }
                    } else {
                        alert("등록 중 오류가 발생했습니다.");
                    }
                } catch (error) {
                    console.error("Error:", error);
                    alert("서버 통신 실패");
                }
            }
        </script>
    </layout:fragment>
</body>
</html>

<div id="privacyModal" class="modal-overlay">

        <div class="modal-header">
            <span class="modal-title">개인정보 수집 및 이용 동의</span>
            <button type="button" class="modal-close" onclick="closePrivacyModal()">&times;</button>
        </div>
        <div class="modal-body">
            <div class="privacy-text">
                <h4>[필수] 개인정보 수집 및 이용 동의</h4>
                <p>회사는 서비스 제공을 위해 최소한의 개인정보를 수집합니다...</p>
                </div>
        </div>
        <div class="modal-footer">
            <button type="button" class="modal-btn confirm" onclick="agreeAndClose()">확인 및 동의</button>
        </div>
    </div>
</div>

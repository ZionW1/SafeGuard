<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>회원가입</title>
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>
<div class="register-container">
    <h2>회원가입</h2>
    <form id="registerForm" class="" th:object="${userVO}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <div class="form-group">
            <input type="text" name="userNm" id="userNm" th:field="*{userNm}" placeholder="이름" required />
        </div>
        <div class="form-group phone-group">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input type="text" id="phoneNum" name="phoneNum" placeholder="01012345678" required pattern="\d{10,11}" />
                <button type="button" id="sendBtn">인증번호 발송</button>
        </div>
        <div class="form-group auth-group hidden" id="authCodeGroup">
            <div id="authSection">
                <input type="text" id="authCode" placeholder="인증번호 6자리 입력">
                <span id="timer">03:00</span>
                <button type="button" id="verifyBtn">인증확인</button>
            </div>
            <p id="resultMessage"></p>
        </div>
        <div class="form-group">
            <input type="email" name="email" id="email" th:field="*{email}" placeholder="이메일" required />
            <div id="emailStatus" style="font-size: 12px; margin-top: 4px;"></div>
        </div>
        <div class="form-group">
            <input type="text" name="userId" id="userId" th:field="*{userId}" placeholder="아이디 (6자 이상)" minlength="6" required />
            <div id="usernameStatus" style="font-size: 12px; margin-top: 4px;"></div>
        </div>
        <div class="form-group">
            <div class="password-input-container">
                <label for="password">비밀번호</label>
                <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" required />
                <span class="password-toggle" onclick="togglePasswordVisibility('password')">👁️</span>
            </div>
            <div class="error-msg" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
        </div>
        <div class="form-group">
            <div class="password-input-container">
                <label for="passwordConfirm">비밀번호 확인</label>
                <input type="password" id="passwordConfirm" name="passwordConfirm" placeholder="비밀번호를 다시 입력하세요" required />
                <span class="password-toggle" onclick="togglePasswordVisibility('passwordConfirm')">👁️</span>
            </div>
            <div class="error-msg" th:if="${#fields.hasErrors('passwordConfirm')}" th:errors="*{passwordConfirm}"></div>
        </div>
        <div class="form-group">
            <input type="text" name="referrerId" id="referrerId" placeholder="추천인 아이디 (선택)" />
        </div>
        <button type="submit" id="joinButton">회원가입 신청</button>
    </form>
    <p class="login-link">
        <a href="/user01" class="back-to-login">← 로그인으로 돌아가기</a>
    </p>
    <p class="login-link">
        <a href="/" class="back-to-login">메인 홈페이지로 돌아가기</a>
    </p>
</div>

<script>
    function togglePasswordVisibility(fieldId) {
            const passwordField = document.getElementById(fieldId);
            const toggleButton = passwordField.nextElementSibling; // 바로 다음 형제 요소 (👁️ 버튼)

            if (passwordField.type === "password") {
                passwordField.type = "text"; // 비밀번호 보이게
                toggleButton.textContent = "🔒"; // 아이콘 변경 (선택 사항)
            } else {
                passwordField.type = "password"; // 비밀번호 숨기게
                toggleButton.textContent = "👁️"; // 아이콘 변경 (선택 사항)
            }
        }
</script>

<script th:inline="javascript">
    const form = document.getElementById('smsForm');
    const resultMessage = document.getElementById('resultMessage');
    const sendBtn = document.getElementById('sendBtn');
    const authCodeGroup = document.getElementById('authCodeGroup');
    const authSection = document.getElementById('authSection');
    const phoneInput = document.getElementById('phoneNum');
    const authCodeInput = document.getElementById('authCode');
    const verifyBtn = document.getElementById('verifyBtn');
    const timerDisplay = document.getElementById('timer');
    const joinButton = document.getElementById('joinButton');
    let verifyBtnCode = false; // 인증번호 확인 버튼 클릭 여부를 추적하는 변수
    const csrfHeader = /*[[${_csrf.headerName}]]*/ '';
    const csrfToken = /*[[${_csrf.token}]]*/ '';

    const requestHeaders = {};

    if (csrfHeader && csrfToken) {
        requestHeaders[csrfHeader] = csrfToken;
    }

sendBtn.addEventListener('click', function() {
    const phoneNumber = document.getElementById('phoneNum').value;

    if(!phoneNumber) {
        alert("번호를 입력해주세요.");
        return;
    }
    
    fetch('/auth/sendCode', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded',
            [csrfHeader]: csrfToken
        },
        body: new URLSearchParams({ phoneNumber: phoneNumber })
    })
    .then(response => {
        // 응답의 Content-Type을 확인하여 JSON인지 텍스트인지 판별
        const contentType = response.headers.get("content-type");
        if (contentType && contentType.indexOf("application/json") !== -1) {
            return response.json().then(data => ({ isJson: true, data }));
        } else {
            return response.text().then(data => ({ isJson: false, data }));
        }
    })
    .then(result => {
        if (result.isJson) {
            // 1. JSON 응답인 경우 (중복 가입 등 서버 에러 메시지)
            const data = result.data;
            if (data.success === true || data.success === "true") {
                alert(data.message || "이미 가입된 번호입니다.");
                resultMessage.style.color = 'red';
                resultMessage.textContent = data.message;
                return; 
            }
        } else {
            // 2. 일반 텍스트 응답인 경우 (인증번호 발송 성공 문자열)
            console.log("서버 응답 문자열:", result.data);
            
            if (result.data.includes("성공")) {
                resultMessage.style.color = 'blue';
                resultMessage.textContent = '인증번호가 발송되었습니다.';
                startTimer(); 
            } else {
                alert("이미 가입된 번호입니다.");
            }
        }
    })
    .catch(error => {
        console.error('Error:', error);
        resultMessage.style.color = 'red';
        resultMessage.textContent = '서비 통신 중 오류가 발생했습니다.';
    });
});

    let timeLeft = 180; // 3분
    let timerInterval;

    function startTimer() {
        const authCodeGroup = document.getElementById('authCodeGroup');

        clearInterval(timerInterval);
        authCodeGroup.classList.remove('hidden');
        timerInterval = setInterval(() => {
            let minutes = Math.floor(timeLeft / 60);
            let seconds = timeLeft % 60;
            document.getElementById('timer').textContent = 
                `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
            
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                alert("인증 시간이 만료되었습니다. 다시 시도해주세요.");
            }
            timeLeft--;
        }, 1000);
    }

    // 인증확인 버튼 클릭 이벤트
    document.getElementById('verifyBtn').addEventListener('click', () => {
        const inputCode = document.getElementById('authCode').value;
        const phoneNumber = document.getElementById('phoneNum').value;
        fetch('/auth/verifyCode', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded', ...requestHeaders },
            body: new URLSearchParams({ phoneNumber: phoneNumber, inputCode: inputCode })
        })
        .then(res => res.text())
        .then(data => {
            if (data === "인증 성공") {
                alert("✅ 인증되었습니다!");
                verifyBtnCode = true;
                clearInterval(timerInterval);
                resultMessage.textContent = "인증되었습니다.";
                // 추가로 인증번호 입력창과 버튼을 비활성화하거나 숨길 수도 있습니다.
                document.getElementById('phoneNum').readOnly = true;
                document.getElementById('phoneNum').style.backgroundColor = "#e9ecef"; // 회색조로 변경
                document.getElementById('phoneNum').style.cursor = "not-allowed";      // 금지 아이콘 표시
                // document.getElementById('sendCode').disabled = true;
                document.getElementById('authCode').disabled = true;
                document.getElementById('verifyBtn').disabled = true;
            } else {
                alert(data);
            }
        });
    });

    function togglePasswordVisibility(fieldId) {
            const passwordField = document.getElementById(fieldId);
            const toggleButton = passwordField.nextElementSibling; // 바로 다음 형제 요소 (👁️ 버튼)

            if (passwordField.type === "password") {
                passwordField.type = "text"; // 비밀번호 보이게
                toggleButton.textContent = "🔒"; // 아이콘 변경 (선택 사항)
            } else {
                passwordField.type = "password"; // 비밀번호 숨기게
                toggleButton.textContent = "👁️"; // 아이콘 변경 (선택 사항)
            }
        }


    // 기존 joinButton click 리스너를 submit 리스너로 변경하는 것이 좋습니다.
const registerForm = document.getElementById('registerForm');
registerForm.addEventListener('submit', function(e) {
    e.preventDefault(); // 폼 전송 막기

    // 1. 인증 여부 확인
    if (typeof verifyBtnCode === 'undefined' || verifyBtnCode === false) {
        alert("인증 확인 후 가입해주세요.");
        return;
    }

    // 2. FormData 생성
    const formData = new URLSearchParams(new FormData(registerForm));

    // 3. Fetch 전송
    fetch('/user02', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded',
            [csrfHeader]: csrfToken // 상단에서 정의한 CSRF 변수 사용
        },
        body: formData
    })
    .then(response => response.json()) // 응답을 JSON으로 파싱
    .then(data => {
        if (data.success) {
            alert("회원가입 및 로그인이 완료되었습니다!");
            window.location.href = data.url; // 메인으로 리다이렉트
        } else {
            // 에러 처리
            if (data.errors) {
                alert("입력 정보를 확인해주세요:\n" + data.errors.join("\n"));
            } else {
                alert(data.message || "회원가입에 실패했습니다.");
            }
        }
    })
    .catch(error => {
        console.error('Error:', error);
        alert("서버 통신 중 오류가 발생했습니다.");
    });
});
</script>
</body>
</html>
